<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manna dari Surga 🌟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5d98a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    overflow: hidden;
  }
  #gameWrapper { position: relative; display: inline-block; }
  canvas { display: block; border-radius: 24px; box-shadow: 0 8px 32px rgba(160,100,20,0.28); }

  #ui {
    position: absolute; top: 10px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center; gap: 8px;
    pointer-events: none; z-index: 5;
  }
  #dayBubble {
    background: rgba(255,255,255,0.9); border-radius: 999px;
    padding: 5px 14px; font-size: 14px; font-weight: bold; color: #7a4000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  #scoreBubble {
    background: rgba(255,255,255,0.9); border-radius: 999px;
    padding: 5px 18px; font-size: 16px; font-weight: bold; color: #b56a00;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  #dotsWrap {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; justify-content: center; z-index: 5; pointer-events: none;
  }
  #dayDots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    background: rgba(255,255,255,0.4); border: 2px solid rgba(255,255,255,0.6);
    transition: all 0.3s; position: relative;
  }
  .dot.done { background: #f4a300; border-color: #b57000; }
  .dot.active { background: #fff; border-color: #f4a300; box-shadow: 0 0 0 3px #f4a30055; }
  .dot.saturday { width: 17px; height: 17px; }
  .dot-label {
    position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
    font-size: 8px; color: rgba(255,255,255,0.85); font-weight: bold; white-space: nowrap;
  }

  #overlayCard {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 24px; z-index: 30;
    background: rgba(253,235,150,0.97);
    padding: 20px 18px; text-align: center; gap: 12px;
  }
  #overlayCard.show { display: flex; }
  #overlayEmoji { font-size: 42px; line-height: 1; }
  #overlayTitle { font-size: 26px; font-weight: bold; color: #2a7a3a; line-height: 1.3; }
  #overlayVerse {
    font-size: 13px; color: #5a3800; line-height: 1.75;
    background: rgba(255,255,255,0.75); border-radius: 14px;
    padding: 12px 16px; max-width: 310px;
    border-left: 4px solid #f4a300; text-align: left;
  }
  #overlayVerseRef { font-size: 12px; color: #b56a00; margin-top: 5px; font-style: italic; text-align: right; }
  #overlayMoral {
    font-size: 13px; color: #5a3800; line-height: 1.7;
    background: rgba(255,255,255,0.65); border-radius: 14px;
    padding: 12px 16px; max-width: 310px; display: none;
    border: 2px dashed #f4a300;
  }
  #overlayBtn {
    background: linear-gradient(135deg, #f7c948, #f4a300);
    border: none; border-radius: 999px;
    padding: 12px 38px; font-size: 19px; font-family: inherit;
    font-weight: bold; color: #fff; text-shadow: 0 1px 2px #0003;
    cursor: pointer; box-shadow: 0 4px 16px rgba(180,100,0,0.3);
    transition: transform 0.15s; pointer-events: all;
  }
  #overlayBtn:hover { transform: scale(1.07); }
  #overlayBtn:active { transform: scale(0.97); }

  #startScreen {
    position: absolute; inset: 0;
    background: rgba(253,235,155,0.97);
    border-radius: 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; z-index: 40; padding: 22px;
  }
  #startScreen h1 { font-size: 28px; color: #b56a00; text-align: center; line-height: 1.3; }
  .info-box {
    background: rgba(255,255,255,0.7); border-radius: 14px;
    padding: 12px 18px; font-size: 14px; color: #7a4800;
    text-align: left; max-width: 300px; line-height: 1.9;
    border-left: 4px solid #f4a300;
  }
  .startBtn {
    background: linear-gradient(135deg, #f7c948, #f4a300);
    border: none; border-radius: 999px;
    padding: 13px 42px; font-size: 21px; font-family: inherit;
    font-weight: bold; color: #fff; cursor: pointer;
    box-shadow: 0 4px 16px rgba(180,100,0,0.3);
    transition: transform 0.15s; pointer-events: all;
  }
  .startBtn:hover { transform: scale(1.07); }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>

  <div id="ui">
    <div id="dayBubble">📅 <span id="dayName">Senin</span></div>
    <div id="scoreBubble">🌾 <span id="scoreNum">0</span> / <span id="targetNum">10</span></div>
  </div>

  <div id="dotsWrap">
    <div id="dayDots"></div>
  </div>

  <div id="overlayCard">
    <div id="overlayEmoji">😊</div>
    <div id="overlayTitle">Sudah Cukup!</div>
    <div id="overlayVerse">
      <div id="verseText">...</div>
      <div id="overlayVerseRef">...</div>
    </div>
    <div id="overlayMoral"></div>
    <button id="overlayBtn" onclick="nextDay()">Lanjut ▶</button>
  </div>

  <div id="startScreen">
    <h1>🌟 Manna dari Surga 🌟</h1>
    <div class="info-box">
      📅 <b>Senin – Jumat:</b> Kumpulkan 10 manna<br>
      ✨ <b>Sabtu:</b> Kumpulkan 20 manna (double!)<br>
      🙏 <b>Minggu:</b> Hari istirahat — Tamat!<br>
      <br>
      Gunakan ← → atau sentuh & geser layar.
    </div>
    <button class="startBtn" onclick="startGame()">Mulai! 🎉</button>
  </div>
</div>

<script>
// ===== DATA =====
const DAYS = [
  { name:'Senin',  short:'Sen', target:10 },
  { name:'Selasa', short:'Sel', target:10 },
  { name:'Rabu',   short:'Rab', target:10 },
  { name:'Kamis',  short:'Kam', target:10 },
  { name:"Jum'at", short:'Jum', target:10 },
  { name:'Sabtu',  short:'Sab', target:20, special:true },
  { name:'Minggu', short:'Min', rest:true },
];

const VERSES = [
  { text:'Jangan khawatir tentang hidupmu, apa yang akan kamu makan atau minum… karena Bapamu yang di sorga tahu bahwa kamu memerlukan semuanya itu.', ref:'Matius 6:25,32' },
  { text:'Allahku akan memenuhi segala keperluanmu menurut kekayaan dan kemuliaan-Nya dalam Kristus Yesus.', ref:'Filipi 4:19' },
  { text:'Serahkanlah segala kekuatiranmu kepada-Nya, sebab Ia yang memelihara kamu.', ref:'1 Petrus 5:7' },
  { text:'TUHAN adalah gembalaku, takkan kekurangan aku.', ref:'Mazmur 23:1' },
  { text:'Carilah dahulu Kerajaan Allah dan kebenarannya, maka semuanya itu akan ditambahkan kepadamu.', ref:'Matius 6:33' },
  { text:'Ia memberi makan kepada setiap makhluk, sebab kasih setia-Nya untuk selama-lamanya.', ref:'Mazmur 136:25' },
  { text:'Tuhan membuka tangan-Nya dan memuaskan keinginan segala yang hidup.', ref:'Mazmur 145:16' },
  { text:'Jangan takut, sebab Aku menyertai engkau; jangan bimbang, sebab Aku ini Allahmu.', ref:'Yesaya 41:10' },
  { text:'Ia yang tidak menyayangkan Anak-Nya sendiri — bagaimana mungkin Ia tidak mengaruniakan segala sesuatu kepada kita?', ref:'Roma 8:32' },
  { text:'Muliakanlah TUHAN dengan hartamu… maka lumbung-lumbungmu akan diisi penuh sampai melimpah-limpah.', ref:'Amsal 3:9-10' },
];

// ===== CANVAS =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const maxW = Math.min(window.innerWidth-12, 480);
  const maxH = Math.min(window.innerHeight-12, 700);
  const ratio = 480/700;
  let w=maxW, h=maxW/ratio;
  if(h>maxH){h=maxH;w=h*ratio;}
  canvas.width=w; canvas.height=h;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  const wrap=document.getElementById('gameWrapper');
  wrap.style.width=w+'px'; wrap.style.height=h+'px';
}
resize();
window.addEventListener('resize',()=>{resize();initScene();});

// ===== STATE =====
let state='idle';
let dayIndex=0, score=0;
let mannas=[],clouds=[],particles=[];
let player={}, keys={left:false,right:false};
let lastTime=0, spawnTimer=0;
let groundY, skyH;
let usedVerseIdx=[];

function getRandVerse(){
  if(usedVerseIdx.length>=VERSES.length) usedVerseIdx=[];
  let i; do{i=Math.floor(Math.random()*VERSES.length);}while(usedVerseIdx.includes(i));
  usedVerseIdx.push(i); return VERSES[i];
}

// ===== DOTS =====
function buildDots(){
  const c=document.getElementById('dayDots'); c.innerHTML='';
  DAYS.forEach((d,i)=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:relative;display:flex;flex-direction:column;align-items:center;padding-bottom:18px;';
    const dot=document.createElement('div');
    dot.className='dot'+(d.special?' saturday':'');
    dot.id='dot'+i;
    const lbl=document.createElement('div');
    lbl.className='dot-label'; lbl.textContent=d.short;
    wrap.appendChild(dot); wrap.appendChild(lbl); c.appendChild(wrap);
  });
  updateDots();
}
function updateDots(){
  DAYS.forEach((_,i)=>{
    const d=document.getElementById('dot'+i);
    if(!d)return;
    d.classList.remove('done','active');
    if(i<dayIndex) d.classList.add('done');
    else if(i===dayIndex) d.classList.add('active');
  });
}

// ===== FLOW =====
function startGame(){
  document.getElementById('startScreen').style.display='none';
  dayIndex=0; score=0; mannas=[]; particles=[]; spawnTimer=0; usedVerseIdx=[];
  buildDots(); updateHUD(); hideOverlay(); initScene();
  state='playing'; lastTime=performance.now();
  requestAnimationFrame(loop);
}

function updateHUD(){
  const d=DAYS[dayIndex]||DAYS[0];
  document.getElementById('dayName').textContent=d.name;
  document.getElementById('scoreNum').textContent=score;
  document.getElementById('targetNum').textContent=d.rest?'–':(d.target||10);
}

function showDayOverlay(){
  state='paused'; mannas=[];
  const d=DAYS[dayIndex];
  const v=getRandVerse();
  const isSat=dayIndex===5;

  document.getElementById('overlayEmoji').textContent=isSat?'⭐':'😊';
  document.getElementById('overlayTitle').textContent=
    isSat?`Sudah Cukup! Hari Sabtu Selesai! 🎉`:`Sudah Cukup! Hari ${d.name} Selesai! 😊`;
  document.getElementById('verseText').textContent='\u201C'+v.text+'\u201D';
  document.getElementById('overlayVerseRef').textContent='— '+v.ref;
  document.getElementById('overlayMoral').style.display='none';
  document.getElementById('overlayBtn').textContent='Lanjut ▶';
  document.getElementById('overlayBtn').style.display='inline-block';
  showOverlay();
}

function showSundayOverlay(){
  document.getElementById('overlayEmoji').textContent='🌈';
  document.getElementById('overlayTitle').textContent='Hari Minggu — Istirahat! 🙏';
  document.getElementById('verseText').textContent=
    '\u201CTUHAN adalah gembalaku, takkan kekurangan aku.\u201D';
  document.getElementById('overlayVerseRef').textContent='— Mazmur 23:1';
  const m=document.getElementById('overlayMoral');
  m.style.display='block';
  m.innerHTML=
    '<b>🌟 Pesan Tuhan untuk Kamu 🌟</b><br><br>'+
    'Seperti manna yang turun setiap hari,<br>'+
    'Tuhan selalu mencukupi kebutuhan kita. 🍞<br><br>'+
    'Kita tidak perlu khawatir atau serakah.<br>'+
    'Cukuplah untuk hari ini —<br>'+
    'besok Tuhan akan mencukupkan lagi! 🙏<br><br>'+
    '<i>"Kasih setia TUHAN tidak berkesudahan,<br>rahmat-Nya tidak habis-habisnya."</i><br>'+
    '<small>— Ratapan 3:22</small>';
  document.getElementById('overlayBtn').textContent='Main Lagi 🔄';
  document.getElementById('overlayBtn').style.display='inline-block';
  dayIndex=6; updateDots();
  showOverlay();
}

function nextDay(){
  hideOverlay();
  if(dayIndex>=6){
    // restart
    dayIndex=0; score=0; mannas=[]; particles=[]; spawnTimer=0; usedVerseIdx=[];
    buildDots(); updateHUD(); initScene();
    state='playing'; lastTime=performance.now();
    requestAnimationFrame(loop);
    return;
  }
  dayIndex++;
  if(DAYS[dayIndex].rest){ showSundayOverlay(); return; }
  score=0; mannas=[]; particles=[]; spawnTimer=0;
  updateDots(); updateHUD(); initScene();
  state='playing'; lastTime=performance.now();
  requestAnimationFrame(loop);
}

function showOverlay(){ document.getElementById('overlayCard').classList.add('show'); }
function hideOverlay(){ document.getElementById('overlayCard').classList.remove('show'); }

// ===== SCENE =====
function initScene(){
  const W=canvas.width, H=canvas.height;
  groundY=H*0.82; skyH=H*0.62;
  player={x:W/2,y:groundY-H*0.09,w:W*0.11,h:H*0.14,speed:W*0.55,dir:0,walk:0};
  clouds=[];
  for(let i=0;i<5;i++) clouds.push({
    x:Math.random()*W, y:H*(0.06+Math.random()*0.2),
    r:W*(0.07+Math.random()*0.06), speed:W*(0.01+Math.random()*0.012)
  });
}

// ===== LOOP =====
function loop(ts){
  if(state!=='playing')return;
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt); draw();
  requestAnimationFrame(loop);
}

function spawnManna(){
  const W=canvas.width,H=canvas.height;
  mannas.push({
    x:W*(0.07+Math.random()*0.86), y:-H*0.04,
    r:W*(0.033+Math.random()*0.018),
    speed:H*(0.11+Math.random()*0.07),
    wobble:Math.random()*Math.PI*2, wobbleSpeed:1.2+Math.random()*1.2,
    rot:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*2, glow:0
  });
}

function spawnParticles(x,y){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, spd=canvas.width*(0.05+Math.random()*0.12);
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-canvas.height*0.1,
      life:1,r:canvas.width*(0.012+Math.random()*0.015),
      color:`hsl(${40+Math.random()*40},100%,${60+Math.random()*25}%)`});
  }
}

function update(dt){
  const W=canvas.width,H=canvas.height;
  const target=(DAYS[dayIndex]&&DAYS[dayIndex].target)||10;
  let dx=0;
  if(keys.left)dx=-1; if(keys.right)dx=1;
  player.dir=dx;
  if(dx!==0)player.walk+=dt*8;
  player.x+=dx*player.speed*dt;
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
  clouds.forEach(c=>{c.x+=c.speed*dt;if(c.x-c.r*2>W)c.x=-c.r*2;});
  spawnTimer+=dt;
  if(spawnTimer>0.9&&score<target){spawnTimer=0;spawnManna();}
  for(let i=mannas.length-1;i>=0;i--){
    const m=mannas[i];
    m.y+=m.speed*dt; m.wobble+=m.wobbleSpeed*dt;
    m.x+=Math.sin(m.wobble)*W*0.0015;
    m.rot+=m.rotSpeed*dt; m.glow=(m.glow+dt*3)%(Math.PI*2);
    if(m.y>H+m.r*2){mannas.splice(i,1);continue;}
    const py=player.y+player.h*0.1,pw=player.w*0.85,ph=player.h*0.55;
    if(m.x>player.x-pw/2&&m.x<player.x+pw/2&&m.y>py-ph/2&&m.y<py+ph/2){
      spawnParticles(m.x,m.y); mannas.splice(i,1);
      score++;
      document.getElementById('scoreNum').textContent=score;
      if(score>=target){showDayOverlay();return;}
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=H*0.6*dt;p.life-=dt*2;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ===== DRAW =====
function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  drawSky(W,H); drawClouds(); drawGround(W,H);
  mannas.forEach(drawManna); drawParticles(); drawPlayer(W,H); drawHUDBar(W,H);
  if(DAYS[dayIndex]&&DAYS[dayIndex].special){
    ctx.save();
    ctx.font=`bold ${W*0.034}px Comic Sans MS,cursive`;
    ctx.fillStyle='#ff7a00'; ctx.textAlign='center'; ctx.globalAlpha=0.7;
    ctx.fillText('⭐ Hari Sabtu — Kumpulkan 20! ⭐',W/2,H*0.115);
    ctx.restore();
  }
}

function drawSky(W,H){
  const g=ctx.createLinearGradient(0,0,0,skyH);
  g.addColorStop(0,'#7ec8f0'); g.addColorStop(1,'#d6f0ff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,skyH);
  ctx.save(); ctx.shadowBlur=28; ctx.shadowColor='#ffe066';
  ctx.beginPath(); ctx.arc(W*0.84,H*0.1,W*0.07,0,Math.PI*2);
  ctx.fillStyle='#ffe838'; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#ffcd3c'; ctx.lineWidth=2.5; ctx.globalAlpha=0.5;
  for(let a=0;a<Math.PI*2;a+=Math.PI/6){
    ctx.beginPath();
    ctx.moveTo(W*0.84+Math.cos(a)*W*0.088,H*0.1+Math.sin(a)*W*0.088);
    ctx.lineTo(W*0.84+Math.cos(a)*W*0.12,H*0.1+Math.sin(a)*W*0.12);
    ctx.stroke();
  }
  ctx.restore();
}

function drawClouds(){
  clouds.forEach(c=>{
    ctx.save(); ctx.globalAlpha=0.88; ctx.fillStyle='#fff';
    ctx.shadowBlur=16; ctx.shadowColor='#c8e8ff';
    for(let i=-1;i<=1;i++){
      ctx.beginPath();
      ctx.arc(c.x+i*c.r*0.7,c.y+Math.abs(i)*c.r*0.15,c.r*(i===0?1:0.7),0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawGround(W,H){
  const g=ctx.createLinearGradient(0,skyH,0,H);
  g.addColorStop(0,'#f0c96a'); g.addColorStop(0.3,'#e8b84a'); g.addColorStop(1,'#d4a030');
  ctx.fillStyle=g; ctx.fillRect(0,skyH,W,H-skyH);
  ctx.beginPath(); ctx.moveTo(0,skyH);
  for(let x=0;x<=W;x+=4) ctx.lineTo(x,skyH+Math.sin(x/W*Math.PI*3)*H*0.025);
  ctx.lineTo(W,skyH); ctx.closePath();
  ctx.fillStyle='#fbe08a'; ctx.fill();
  ctx.fillStyle='rgba(180,120,0,0.07)';
  ctx.fillRect(0,skyH,W,H*0.02);
}

function drawPlayer(W,H){
  const p=player,x=p.x,y=p.y,w=p.w,h=p.h;
  const bobY=Math.sin(p.walk)*h*0.04;
  const dir=p.dir>=0?1:-1;
  ctx.save(); ctx.translate(x,y+bobY);
  ctx.beginPath(); ctx.ellipse(0,h*0.5,w*0.5,h*0.07,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fill();
  ctx.scale(dir,1);
  ctx.beginPath(); ctx.roundRect(-w*0.38,-h*0.1,w*0.76,h*0.6,[w*0.12,w*0.12,w*0.24,w*0.24]);
  ctx.fillStyle='#e8c46a'; ctx.fill(); ctx.strokeStyle='#c8953a'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.roundRect(-w*0.2,-h*0.07,w*0.18,h*0.3,w*0.06);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
  const aw=Math.sin(p.walk)*0.35;
  ctx.save(); ctx.translate(-w*0.35,h*0.04); ctx.rotate(aw);
  ctx.beginPath(); ctx.roundRect(-w*0.1,0,w*0.18,h*0.28,w*0.06); ctx.fillStyle='#d4a030'; ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(w*0.25,h*0.04); ctx.rotate(-aw);
  ctx.beginPath(); ctx.roundRect(-w*0.08,0,w*0.18,h*0.28,w*0.06); ctx.fillStyle='#d4a030'; ctx.fill(); ctx.restore();
  const lw=Math.sin(p.walk)*0.2;
  [-1,1].forEach((s,idx)=>{
    ctx.save(); ctx.translate(s*w*0.13,h*0.45); ctx.rotate(idx===0?lw:-lw);
    ctx.beginPath(); ctx.roundRect(-w*0.1,0,w*0.2,h*0.22,w*0.07); ctx.fillStyle='#c8953a'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,h*0.22,w*0.14,h*0.055,0,0,Math.PI*2); ctx.fillStyle='#8b5e1a'; ctx.fill();
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(0,-h*0.26,w*0.3,0,Math.PI*2); ctx.fillStyle='#f5c78a'; ctx.fill();
  ctx.strokeStyle='#d49050'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,-h*0.3,w*0.31,Math.PI*1.1,Math.PI*1.9);
  ctx.lineTo(w*0.31,-h*0.18); ctx.lineTo(-w*0.31,-h*0.18); ctx.fillStyle='#c8953a'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-w*0.31,-h*0.22); ctx.quadraticCurveTo(0,-h*0.34,w*0.31,-h*0.22);
  ctx.strokeStyle='#8b5e1a'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#3a2000';
  ctx.beginPath(); ctx.arc(w*0.1,-h*0.25,w*0.042,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-w*0.1,-h*0.25,w*0.042,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(w*0.115,-h*0.263,w*0.016,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-w*0.086,-h*0.263,w*0.016,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-h*0.19,w*0.13,0.15,Math.PI-0.15);
  ctx.strokeStyle='#c8703a'; ctx.lineWidth=2; ctx.stroke();
  ctx.globalAlpha=0.35; ctx.fillStyle='#ff8080';
  ctx.beginPath(); ctx.ellipse(w*0.2,-h*0.2,w*0.09,w*0.055,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-w*0.2,-h*0.2,w*0.09,w*0.055,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1; ctx.save(); ctx.translate(w*0.32,h*0.12);
  ctx.beginPath(); ctx.moveTo(-w*0.12,0); ctx.lineTo(-w*0.15,h*0.17); ctx.lineTo(w*0.15,h*0.17); ctx.lineTo(w*0.12,0); ctx.closePath();
  ctx.fillStyle='#c8853a'; ctx.fill(); ctx.strokeStyle='#9a5a18'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.strokeStyle='#9a5a1880'; ctx.lineWidth=1;
  for(let bi=1;bi<3;bi++){ctx.beginPath();ctx.moveTo(-w*0.15+bi*w*0.09,0);ctx.lineTo(-w*0.15+bi*w*0.1,h*0.17);ctx.stroke();}
  ctx.beginPath(); ctx.arc(0,-w*0.01,w*0.1,Math.PI,0); ctx.strokeStyle='#9a5a18'; ctx.lineWidth=2; ctx.stroke();
  ctx.restore(); ctx.restore();
}

function drawManna(m){
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.rot);
  const ga=0.16+Math.sin(m.glow)*0.08;
  const gr=ctx.createRadialGradient(0,0,m.r*0.2,0,0,m.r*2.2);
  gr.addColorStop(0,`rgba(255,248,180,${ga*2})`); gr.addColorStop(1,'rgba(255,248,100,0)');
  ctx.beginPath(); ctx.arc(0,0,m.r*2.2,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,0,m.r,m.r*0.72,0,0,Math.PI*2);
  ctx.fillStyle='#fff8e0'; ctx.shadowBlur=10; ctx.shadowColor='#ffe080'; ctx.fill(); ctx.shadowBlur=0;
  for(let i=-1;i<=1;i++){
    ctx.beginPath(); ctx.ellipse(i*m.r*0.45,-m.r*0.28,m.r*0.32,m.r*0.28,0,0,Math.PI);
    ctx.fillStyle='#fffaee'; ctx.fill();
  }
  const cg=ctx.createLinearGradient(0,-m.r*0.7,0,m.r*0.1);
  cg.addColorStop(0,'rgba(255,240,160,0.7)'); cg.addColorStop(1,'rgba(255,255,240,0)');
  ctx.beginPath(); ctx.ellipse(0,0,m.r,m.r*0.72,0,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
  ctx.fillStyle='#ffe838'; ctx.globalAlpha=0.5+Math.sin(m.glow*1.3)*0.3;
  [[m.r*1.1,-m.r*0.6],[-m.r*1.0,m.r*0.4],[m.r*0.4,-m.r*1.0]].forEach(([sx,sy])=>{
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2-Math.PI/2,ra=a+Math.PI/5,ro=m.r*0.16,ri=m.r*0.07;
      i===0?ctx.moveTo(sx+Math.cos(a)*ro,sy+Math.sin(a)*ro):ctx.lineTo(sx+Math.cos(a)*ro,sy+Math.sin(a)*ro);
      ctx.lineTo(sx+Math.cos(ra)*ri,sy+Math.sin(ra)*ri);
    }
    ctx.closePath(); ctx.fill();
  });
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life*0.9; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

function drawHUDBar(W,H){
  const d=DAYS[dayIndex]; if(!d||d.rest)return;
  const target=d.target||10;
  const bw=W*0.55,bh=H*0.018,bx=(W-bw)/2,by=H*0.07;
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,bh/2); ctx.fill();
  const prog=Math.min(score/target,1);
  if(prog>0){
    const g=ctx.createLinearGradient(bx,0,bx+bw,0);
    g.addColorStop(0,'#ffcd3c'); g.addColorStop(1,'#ff9d00');
    ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(bx,by,bw*prog,bh,bh/2); ctx.fill();
  }
}

// ===== CONTROLS =====
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});
let touchStartX=0;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  keys.left=dx<-8; keys.right=dx>8; e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{keys.left=false;keys.right=false;});
let mouseDown=false,mouseX=0;
canvas.addEventListener('mousedown',e=>{mouseDown=true;mouseX=e.clientX;});
canvas.addEventListener('mousemove',e=>{
  if(!mouseDown)return;
  const dx=e.clientX-mouseX;
  keys.left=dx<-6; keys.right=dx>6;
  if(Math.abs(dx)<6){keys.left=false;keys.right=false;}
});
canvas.addEventListener('mouseup',()=>{mouseDown=false;keys.left=false;keys.right=false;});

initScene(); draw();
</script>
