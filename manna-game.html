<script>
// ============================================================
//  PANDUAN MENGGANTI GAMBAR / ASET
// ============================================================
//
//  Semua gambar dihasilkan secara prosedural (pakai Graphics)
//  di fungsi preload() masing-masing Scene.
//
//  Untuk MENGGANTI dengan gambar PNG kamu sendiri:
//  1. Letakkan file PNG di folder yang sama dengan index.html
//  2. Di fungsi preload(), ubah baris:
//       this.createXxxTexture(...)      ← hapus baris ini
//     menjadi:
//       this.load.image('KEY', 'namafile.png')
//
//  Daftar KEY gambar yang digunakan:
//  ┌─────────────────┬────────────────────────────────────────┐
//  │  KEY            │  Digunakan untuk                       │
//  ├─────────────────┼────────────────────────────────────────┤
//  │  'sky'          │  Background langit                     │
//  │  'ground'       │  Tanah/pasir di bawah                  │
//  │  'sun'          │  Matahari di pojok kanan atas           │
//  │  'cloud'        │  Awan putih (dipakai berulang)         │
//  │  'player'       │  Karakter pemain (orang)               │
//  │  'manna'        │  Butiran manna yang jatuh              │
//  └─────────────────┴────────────────────────────────────────┘
//
//  Contoh mengganti karakter:
//    // Di preload():
//    this.load.image('player', 'karakter_saya.png');
//    // Hapus baris: this.createPlayerTexture();
//
//  Ukuran canvas: 480 x 700 px
// ============================================================


// ============================================================
//  DATA PERMAINAN
// ============================================================

// Data 7 hari permainan (Senin–Minggu)
const DAYS = [
  { name: 'Senin',   short: 'Sen', target: 10 },
  { name: 'Selasa',  short: 'Sel', target: 10 },
  { name: 'Rabu',    short: 'Rab', target: 10 },
  { name: 'Kamis',   short: 'Kam', target: 10 },
  { name: "Jum'at",  short: 'Jum', target: 10 },
  { name: 'Sabtu',   short: 'Sab', target: 20, special: true },
  { name: 'Minggu',  short: 'Min', rest: true },  // Hari istirahat
];

// Ayat-ayat Alkitab yang tampil setelah setiap hari selesai
const VERSES = [
  { text: 'Hebat! Kamu sudah dapat roti hari ini. Ingat ya: Tuhan itu baik. Dia dengar kalau kita lapar dan Dia pasti kasih kita makan. Tidur nyenyak ya, besok kita cari lagi!', ref: 'Salam Sayang,' },
  { text: 'Wah, dapat lagi! Ingat prinsipnya: Jangan Serakah. Ambil yang perlu saja untuk hari ini. Kita belajar berbagi dan percaya kalau besok Tuhan kasih lagi yang baru.', ref: 'Salam Sayang,' },
  { text: 'Hebat! Kamu sudah kumpulkan roti hari ini. Ingat ya: Jangan Khawatir. Tuhan itu kaya banget, besok pasti ada roti baru lagi yang turun dari langit buat kamu.', ref: 'Salam Sayang,' },
  { text: 'Wah, rotinya tampak enak! Ayo Bersyukur. Karena Tuhan sudah kasih makanan yang sehat, kita harus habiskan dan tidak boleh buang-buang makanan ya!', ref: 'Salam Sayang,' },
  { text: 'Jagoan, kamu hebat banget hari ini! Ingat ya: Anak Hebat Pasti Taat. Karena kamu pintar ikut aturan, hati jadi tenang dan senang. Ayo istirahat yang cukup, karena besok ada kejutan: kita bakal ambil roti dua kali lipat!', ref: 'Salam Sayang,' },
  { text: 'Keren! Hari ini kita ambil dua kali lipat ya? Kenapa? Karena besok hari istirahat. Kita belajar Berencana supaya besok kita bisa tenang main sama Tuhan tanpa harus capek cari roti lagi.', ref: 'Salam Sayang,' },
];

// Variabel global state (berbagi antar Scene)
const GameState = {
  dayIndex: 0,
  score: 0,
  usedVerseIdx: [],

  // Ambil ayat acak yang belum dipakai
  getRandomVerse() {
    this.usedVerseIdx.push(this.dayIndex);
    return VERSES[this.dayIndex];
  },

  // Reset untuk mulai ulang
  reset() {
    this.dayIndex = 0;
    this.score = 0;
    this.usedVerseIdx = [];
  }
};


// ============================================================
//  SCENE 1: BootScene
//  Tugasnya: generate semua texture prosedural lalu lanjut
//  ke StartScene. Kalau kamu pakai file PNG, load di sini.
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super({ key: 'BootScene' }); }

  preload() {
    // ── CARA MENGGANTI DENGAN FILE GAMBAR KAMU ──────────────
    // Hapus baris createXxxTexture() dan tulis:
    //   this.load.image('sky',    'assets/sky.png');
    //   this.load.image('ground', 'assets/ground.png');
    //   this.load.image('sun',    'assets/sun.png');
    //   this.load.image('cloud',  'assets/cloud.png');
    //   this.load.image('player', 'assets/player.png');
    //   this.load.image('manna',  'assets/manna.png');
    // ────────────────────────────────────────────────────────

    // Sekarang kita pakai gambar prosedural (Graphics)
    //this.createSkyTexture();
    //this.createGroundTexture();
    //this.createSunTexture();
    //this.createCloudTexture();
   // this.createPlayerTexture();
    //this.createMannaTexture();
	
	    this.load.image('sky', 'assets/desert.png');
	    this.load.image('cloud', 'assets/cloud.png');
	this.load.image('player', 'assets/boy.png');
		this.load.image('manna',  'assets/manna2.png');
		this.load.image('ground', 'assets/ground.png');
  }

  create() {
    // Semua aset sudah siap → buka layar Start
    this.scene.start('StartScene');
  }

  // ── GENERATOR TEXTURE PROSEDURAL ────────────────────────
  // Setiap fungsi di bawah menggambar ke Graphics lalu
  // di-generate sebagai texture dengan key tertentu.
  // Kamu bisa HAPUS fungsi ini jika sudah pakai file PNG.

  // LANGIT — gradasi biru ke putih (480x580 px)
  createSkyTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    // Gradasi langit
    const colors = [0x5ab0e8, 0x7ec8f0, 0xb8e4ff, 0xddf2ff];
    const step = 580 / (colors.length - 1);
    for (let i = 0; i < colors.length - 1; i++) {
      for (let y = 0; y < step; y++) {
        const t = y / step;
        const c1 = Phaser.Display.Color.IntegerToColor(colors[i]);
        const c2 = Phaser.Display.Color.IntegerToColor(colors[i + 1]);
        const r = Math.round(Phaser.Math.Linear(c1.r, c2.r, t));
        const grn = Math.round(Phaser.Math.Linear(c1.g, c2.g, t));
        const b = Math.round(Phaser.Math.Linear(c1.b, c2.b, t));
        g.fillStyle(Phaser.Display.Color.GetColor(r, grn, b), 1);
        g.fillRect(0, i * step + y, 480, 1);
      }
    }
    g.generateTexture('sky', 480, 580);
    g.destroy();
  }

  // TANAH — gradasi pasir/kuning keemasan (480x120 px)
  createGroundTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const colors = [0xfbe08a, 0xe8b84a, 0xd4a030, 0xb88020];
    const step = 120 / (colors.length - 1);
    for (let i = 0; i < colors.length - 1; i++) {
      for (let y = 0; y < step; y++) {
        const t = y / step;
        const c1 = Phaser.Display.Color.IntegerToColor(colors[i]);
        const c2 = Phaser.Display.Color.IntegerToColor(colors[i + 1]);
        const r = Math.round(Phaser.Math.Linear(c1.r, c2.r, t));
        const grn = Math.round(Phaser.Math.Linear(c1.g, c2.g, t));
        const b = Math.round(Phaser.Math.Linear(c1.b, c2.b, t));
        g.fillStyle(Phaser.Display.Color.GetColor(r, grn, b), 1);
        g.fillRect(0, i * step + y, 480, 1);
      }
    }
    // Garis tepi atas yang sedikit bergelombang
    g.fillStyle(0xfff0b0, 0.6);
    g.fillRect(0, 0, 480, 8);
    g.generateTexture('ground', 480, 120);
    g.destroy();
  }

  // MATAHARI — lingkaran kuning + sinar (96x96 px)
  createSunTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const cx = 48, cy = 48, r = 26;
    // Sinar-sinar
    g.lineStyle(3, 0xffcd3c, 0.7);
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
      g.beginPath();
      g.moveTo(cx + Math.cos(a) * (r + 8), cy + Math.sin(a) * (r + 8));
      g.lineTo(cx + Math.cos(a) * (r + 18), cy + Math.sin(a) * (r + 18));
      g.strokePath();
    }
    // Cahaya luar (glow)
    g.fillStyle(0xffe066, 0.18);
    g.fillCircle(cx, cy, r + 10);
    // Badan matahari
    g.fillStyle(0xffe838, 1);
    g.fillCircle(cx, cy, r);
    // Highlight
    g.fillStyle(0xfffde0, 0.5);
    g.fillCircle(cx - 8, cy - 8, 10);
    g.generateTexture('sun', 96, 96);
    g.destroy();
  }

  // AWAN — tiga lingkaran putih bertumpuk (120x60 px)
  createCloudTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    g.fillStyle(0xffffff, 0.95);
    // Lingkaran tengah (lebih besar)
    g.fillCircle(60, 36, 26);
    // Lingkaran kiri
    g.fillCircle(34, 42, 18);
    // Lingkaran kanan
    g.fillCircle(86, 42, 18);
    // Bawah awan (datar)
    g.fillRect(20, 42, 80, 18);
    // Bayangan halus
    g.fillStyle(0xc8e8ff, 0.25);
    g.fillEllipse(60, 56, 90, 16);
    g.generateTexture('cloud', 120, 60);
    g.destroy();
  }

  // KARAKTER PEMAIN — orang sederhana dari atas ke bawah (56x80 px)
  createPlayerTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const cx = 28;

    // ── Bayangan di bawah kaki ──
    g.fillStyle(0x000000, 0.12);
    g.fillEllipse(cx, 76, 42, 10);

    // ── Kaki kiri ──
    g.fillStyle(0xc8953a, 1);
    g.fillRoundedRect(14, 52, 10, 20, 4);
    // Sepatu kiri
    g.fillStyle(0x6b3a0e, 1);
    g.fillEllipse(14, 73, 16, 7);

    // ── Kaki kanan ──
    g.fillStyle(0xc8953a, 1);
    g.fillRoundedRect(28, 52, 10, 20, 4);
    // Sepatu kanan
    g.fillStyle(0x6b3a0e, 1);
    g.fillEllipse(34, 73, 16, 7);

    // ── Lengan kiri ──
    g.fillStyle(0xd4a030, 1);
    g.fillRoundedRect(6, 22, 9, 26, 4);

    // ── Lengan kanan ──
    g.fillStyle(0xd4a030, 1);
    g.fillRoundedRect(37, 22, 9, 26, 4);

    // ── Badan ──
    g.fillStyle(0xe8c46a, 1);
    g.fillRoundedRect(14, 20, 28, 36, { tl: 8, tr: 8, bl: 12, br: 12 });
    // Lipatan baju
    g.fillStyle(0xffffff, 0.2);
    g.fillRoundedRect(16, 22, 8, 20, 4);
    // Ikat pinggang
    g.fillStyle(0x9a5a18, 0.5);
    g.fillRect(14, 46, 28, 3);

    // ── Keranjang / Wadah di tangan ──
    g.fillStyle(0xc8853a, 1);
    g.fillRect(36, 34, 14, 12);
    g.fillStyle(0x9a5a18, 0.5);
    g.fillRect(36, 34, 4, 12);
    g.fillRect(43, 34, 4, 12);

    // ── Kepala ──
    g.fillStyle(0xf5c78a, 1);
    g.fillCircle(cx, 14, 14);
    g.lineStyle(1.5, 0xd49050, 1);
    g.strokeCircle(cx, 14, 14);

    // ── Rambut ──
    g.fillStyle(0x7a3c00, 1);
    g.fillArc(cx, 8, 15, 200, 340, false);
    // Poni
    g.fillRoundedRect(16, 3, 26, 8, 4);

    // ── Mata kiri ──
    g.fillStyle(0x3a2000, 1);
    g.fillCircle(22, 13, 2.5);
    // Kilat mata kiri
    g.fillStyle(0xffffff, 1);
    g.fillCircle(23, 12, 1);

    // ── Mata kanan ──
    g.fillStyle(0x3a2000, 1);
    g.fillCircle(34, 13, 2.5);
    // Kilat mata kanan
    g.fillStyle(0xffffff, 1);
    g.fillCircle(35, 12, 1);

    // ── Senyum ──
    g.lineStyle(2, 0xc8703a, 1);
    g.beginPath();
    g.arc(cx, 17, 7, 0.2, Math.PI - 0.2);
    g.strokePath();

    // ── Pipi merah muda ──
    g.fillStyle(0xff8080, 0.3);
    g.fillEllipse(18, 18, 10, 7);
    g.fillEllipse(38, 18, 10, 7);

    g.generateTexture('player', 56, 80);
    g.destroy();
  }

  // MANNA — elips emas bercahaya dengan bintang-bintang kecil (48x48 px)
  createMannaTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const cx = 24, cy = 24;

    // Cahaya luar (aura)
    g.fillStyle(0xffff80, 0.15);
    g.fillCircle(cx, cy, 22);

    // Badan manna — elips keemasan
    g.fillStyle(0xfff8e0, 1);
    g.fillEllipse(cx, cy, 36, 26);
    g.lineStyle(1.5, 0xffe080, 1);
    g.strokeEllipse(cx, cy, 36, 26);

    // Tonjolan atas (seperti roti)
    g.fillStyle(0xfffaee, 0.9);
    g.fillEllipse(cx - 7, cy - 7, 14, 12);
    g.fillEllipse(cx + 7, cy - 7, 14, 12);
    g.fillEllipse(cx, cy - 10, 14, 12);

    // Highlight cahaya
    g.fillStyle(0xfffde0, 0.6);
    g.fillEllipse(cx - 4, cy - 4, 16, 10);

    // Bintang kecil di sekitar (sparkle)
    g.fillStyle(0xffe838, 0.8);
    // Bintang atas kanan
    drawStar(g, cx + 14, cy - 8, 5, 2.5, 5);
    // Bintang kiri
    drawStar(g, cx - 15, cy + 4, 4, 2, 5);
    // Bintang bawah
    drawStar(g, cx + 4, cy + 14, 4, 2, 5);

    g.generateTexture('manna', 48, 48);
    g.destroy();
  }
}

// Helper: gambar bintang ke Graphics
function drawStar(g, x, y, outerR, innerR, points) {
  g.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    if (i === 0) g.moveTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
    else g.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
  }
  g.closePath();
  g.fillPath();
}


// ============================================================
//  SCENE 2: StartScene
//  Layar pembuka / intro game
// ============================================================
class StartScene extends Phaser.Scene {
  constructor() { super({ key: 'StartScene' }); }

  create() {
    const W = this.scale.width, H = this.scale.height;

    // Background langit
    this.add.image(W / 2, 290, 'sky').setDisplaySize(W, 580);

    // Tanah
    this.add.image(W / 2, H - 60, 'ground').setDisplaySize(W, 120);

    // Matahari
    //this.add.image(W - 60, 60, 'sun').setScale(0.9);

    // Awan dekoratif
    this.add.image(80, 80, 'cloud').setScale(0.8).setAlpha(0.8);
    this.add.image(300, 50, 'cloud').setScale(1.1).setAlpha(0.7);

    // Karakter besar di tengah sebagai dekorasi
    const hero = this.add.image(W / 2, H - 140, 'player').setScale(1.4);
    // Animasi naik-turun (breathing)
    this.tweens.add({
      targets: hero,
      y: H - 150,
      duration: 1200,
      ease: 'Sine.easeInOut',
      yoyo: true,
      repeat: -1
    });

    // Beberapa manna jatuh sebagai dekorasi
    for (let i = 0; i < 6; i++) {
      const m = this.add.image(
        Phaser.Math.Between(30, W - 30),
        Phaser.Math.Between(100, H - 200),
        'manna'
      ).setScale(0.7).setAlpha(0.8);
      // Animasi mengambang
      this.tweens.add({
        targets: m,
        y: m.y - Phaser.Math.Between(15, 35),
        alpha: { from: 0.4, to: 0.9 },
        duration: Phaser.Math.Between(1000, 2000),
        ease: 'Sine.easeInOut',
        yoyo: true,
        repeat: -1,
        delay: Phaser.Math.Between(0, 800)
      });
    }

    // ── Panel judul ──────────────────────────────────────────
    // Kotak background judul
    const titleBg = this.add.graphics();
    titleBg.fillStyle(0xfff8d0, 0.95);
    titleBg.fillRoundedRect(W / 2 - 190, 30, 380, 70, 20);
    titleBg.lineStyle(3, 0xf4a300, 1);
    titleBg.strokeRoundedRect(W / 2 - 190, 30, 380, 70, 20);

    // Teks judul
    this.add.text(W / 2, 66, '🌟 Manna dari Surga 🌟', {
      fontSize: '24px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#b56a00',
      fontStyle: 'bold',
      stroke: '#fff8d0',
      strokeThickness: 2
    }).setOrigin(0.5);

    // ── Panel info cara main ──────────────────────────────────
    const infoBg = this.add.graphics();
    infoBg.fillStyle(0xffffff, 0.8);
    infoBg.fillRoundedRect(W / 2 - 155, 155, 310, 130, 16);
    infoBg.lineStyle(3, 0xf4a300, 1);
    infoBg.strokeRoundedRect(W / 2 - 155, 155, 310, 130, 16);
    // Garis aksen kiri
    infoBg.fillStyle(0xf4a300, 1);
    infoBg.fillRoundedRect(W / 2 - 155, 155, 6, 130, { tl: 16, tr: 0, bl: 16, br: 0 });

    const infoLines = [
      'Halo jagoan! ',
      'Bangsa Israel lagi lapar di padang pasir nih.',
      'Yuk, kita bantu kumpulkan roti Manna.',
      'Ingat ya, ambil secukupnya saja!✨',
      'Tekan ← → atau sentuh & geser layar'
    ];
    infoLines.forEach((line, i) => {
      this.add.text(W / 2 - 130, 170 + i * 23, line, {
        fontSize: '13px',
        fontFamily: '"Comic Sans MS", cursive',
        color: '#7a4800',
        lineSpacing: 4
      });
    });

    // ── Tombol Mulai ─────────────────────────────────────────
    const btnBg = this.add.graphics();
    btnBg.fillStyle(0xf4a300, 1);
    btnBg.fillRoundedRect(W / 2 - 110, 310, 220, 56, 28);
    btnBg.lineStyle(3, 0xffd060, 1);
    btnBg.strokeRoundedRect(W / 2 - 110, 310, 220, 56, 28);

    const btnText = this.add.text(W / 2, 338, 'Mulai! 🎉', {
      fontSize: '24px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#ffffff',
      fontStyle: 'bold',
      stroke: '#0003',
      strokeThickness: 2
    }).setOrigin(0.5);

    // Zona klik tombol (invisible rectangle)
    const btnZone = this.add.zone(W / 2, 338, 220, 56)
      .setInteractive({ cursor: 'pointer' });

    // Efek hover tombol
    btnZone.on('pointerover', () => {
      btnBg.setScale(1.06);
      btnText.setScale(1.06);
    });
    btnZone.on('pointerout', () => {
      btnBg.setScale(1);
      btnText.setScale(1);
    });

    // Klik → mulai permainan
    btnZone.on('pointerdown', () => {
      GameState.reset();
      // Animasi tombol ditekan
      this.tweens.add({
        targets: [btnBg, btnText],
        scaleX: 0.95,
        scaleY: 0.95,
        duration: 80,
        yoyo: true,
        onComplete: () => this.scene.start('GameScene')
      });
    });

    // Animasi tombol berdenyut
    this.tweens.add({
      targets: [btnBg, btnText],
      scaleX: 1.04,
      scaleY: 1.04,
      duration: 800,
      ease: 'Sine.easeInOut',
      yoyo: true,
      repeat: -1
    });

    // ── Dots indikator hari di bawah ─────────────────────────
    this.createDayDots(W, H);
  }

  // Menggambar dots 7 hari di bagian bawah layar
  createDayDots(W, H) {
    const dotSpacing = 44;
    const startX = W / 2 - ((DAYS.length - 1) / 2) * dotSpacing;
    const dotY = H - 28;

    DAYS.forEach((day, i) => {
      const x = startX + i * dotSpacing;
      const isSaturday = day.special;
      const r = isSaturday ? 9 : 7;

      // Lingkaran dot
      const dot = this.add.graphics();
      dot.lineStyle(2, 0xffffff, 0.7);
      dot.fillStyle(0xffffff, 0.25);
      dot.fillCircle(x, dotY, r);
      dot.strokeCircle(x, dotY, r);

      // Label hari
      this.add.text(x, dotY + r + 10, day.short, {
        fontSize: '8px',
        fontFamily: '"Comic Sans MS", cursive',
        color: 'rgba(255,255,255,0.85)',
        fontStyle: 'bold'
      }).setOrigin(0.5, 0);
    });
  }
}


// ============================================================
//  SCENE 3: GameScene
//  Inti permainan: pemain bergerak, manna jatuh, kumpulkan!
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  create() {
    const W = this.scale.width, H = this.scale.height;

    // ── Background ───────────────────────────────────────────
    this.add.image(W / 2, 290, 'sky').setDisplaySize(W, 580);
    this.add.image(W / 2, H - 60, 'ground').setDisplaySize(W, 120);
   // this.add.image(W - 58, 58, 'sun');

    // ── Awan (bergerak pelan ke kanan) ────────────────────────
    this.clouds = [];
    const cloudData = [
      { x: 80,  y: 60,  scl: 0.8, spd: 22 },
      { x: 240, y: 40,  scl: 1.0, spd: 30 },
      { x: 390, y: 80,  scl: 0.7, spd: 18 },
      { x: 140, y: 110, scl: 0.65,spd: 26 },
      { x: 340, y: 95,  scl: 0.9, spd: 35 },
    ];
    cloudData.forEach(d => {
      // Setiap awan adalah image biasa
      const c = this.add.image(d.x, d.y, 'cloud').setScale(d.scl).setAlpha(0.88);
      c.speed = d.spd; // kecepatan piksel/detik
      this.clouds.push(c);
    });

    // ── Pemain ────────────────────────────────────────────────
    // Posisi awal di tengah, tepat di atas tanah
    this.player = this.physics.add.image(W / 2, H - 115, 'player');
    this.player.setCollideWorldBounds(true); // tidak bisa keluar layar
    this.player.setDepth(10);               // tampil di depan semua objek

    // ── Grup manna (untuk manajemen efisien) ─────────────────
    // Menggunakan Group dengan recycling (setMaxSize)
    this.mannaGroup = this.physics.add.group();

    // Timer spawn manna setiap 0.9 detik
    this.spawnTimer = this.time.addEvent({
      delay: 900,
      callback: this.spawnManna,
      callbackScope: this,
      loop: true
    });

    // ── Kontrol keyboard ─────────────────────────────────────
    // Phaser 3 menyediakan cursor keys bawaan
    this.cursors = this.input.keyboard.createCursorKeys();
    // Tambahan WASD
    this.wasd = this.input.keyboard.addKeys({
      left: Phaser.Input.Keyboard.KeyCodes.A,
      right: Phaser.Input.Keyboard.KeyCodes.D
    });

    // ── Kontrol sentuh / mouse ────────────────────────────────
    this.touchDeltaX = 0;
    this.touchActive = false;
    this.touchStartX = 0;

    this.input.on('pointerdown', (p) => {
      this.touchActive = true;
      this.touchStartX = p.x;
    });
    this.input.on('pointermove', (p) => {
      if (this.touchActive) this.touchDeltaX = p.x - this.touchStartX;
    });
    this.input.on('pointerup', () => {
      this.touchActive = false;
      this.touchDeltaX = 0;
    });

    // ── Overlap: saat manna menyentuh pemain ─────────────────
    // Phaser mengurus deteksi tabrakan secara otomatis
    this.physics.add.overlap(
      this.player,
      this.mannaGroup,
      this.catchManna,   // callback
      null,
      this
    );

    // ── Partikel efek tangkap manna ───────────────────────────
    // ParticleEmitter Phaser 3.60+
    this.particles = this.add.particles(0, 0, 'manna', {
      speed: { min: 80, max: 200 },
      angle: { min: 0, max: 360 },
      scale: { start: 0.4, end: 0 },
      alpha: { start: 1, end: 0 },
      lifespan: 500,
      quantity: 8,
      emitting: false  // hanya memancar saat dipanggil explode()
    });
    this.particles.setDepth(20);

    // ── HUD (Heads-Up Display) ────────────────────────────────
    this.createHUD();

    // Refresh tampilan hari & skor
    this.updateHUD();

    // Tampilkan pesan khusus Sabtu
    if (DAYS[GameState.dayIndex].special) {
      this.add.text(W / 2, 118, '⭐ Hari Sabtu — Kumpulkan 20! ⭐', {
        fontSize: '14px',
        fontFamily: '"Comic Sans MS", cursive',
        color: '#ff7a00',
        fontStyle: 'bold'
      }).setOrigin(0.5).setAlpha(0.8).setDepth(5);
    }
  }

  // ── HUD: membuat elemen UI di atas layar ──────────────────
  createHUD() {
    const W = this.scale.width;

    // Panel hari (kiri)
    this.dayBg = this.add.graphics().setDepth(15);
    this.dayBg.fillStyle(0xffffff, 0.9);
    this.dayBg.fillRoundedRect(10, 10, 130, 32, 16);

    this.dayText = this.add.text(75, 26, '📅 Senin', {
      fontSize: '13px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#7a4000',
      fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(16);

    // Panel skor (kanan)
    this.scoreBg = this.add.graphics().setDepth(15);
    this.scoreBg.fillStyle(0xffffff, 0.9);
    this.scoreBg.fillRoundedRect(W - 140, 10, 130, 32, 16);

    this.scoreText = this.add.text(W - 75, 26, '🌾 0 / 10', {
      fontSize: '14px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#b56a00',
      fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(16);

    // Progress bar background
    const barW = W * 0.55, barH = 8;
    const barX = (W - barW) / 2, barY = 14;
    this.add.graphics()
      .fillStyle(0x000000, 0.1)
      .fillRoundedRect(barX, barY, barW, barH, 4)
      .setDepth(15);

    // Progress bar isi (akan diupdate)
    this.progressBar = this.add.graphics().setDepth(16);
    this.progressBarConfig = { x: barX, y: barY, w: barW, h: barH };

    // Dots hari di bagian bawah
    this.createDayDots();
  }

  // Dots indikator hari (bawah layar)
  createDayDots() {
    const W = this.scale.width, H = this.scale.height;
    const dotSpacing = 44;
    const startX = W / 2 - ((DAYS.length - 1) / 2) * dotSpacing;
    const dotY = H - 28;

    this.dotGraphics = this.add.graphics().setDepth(15);

    DAYS.forEach((day, i) => {
      const x = startX + i * dotSpacing;
      this.add.text(x, dotY + 9, day.short, {
        fontSize: '8px',
        fontFamily: '"Comic Sans MS", cursive',
        color: 'rgba(255,255,255,0.85)',
        fontStyle: 'bold'
      }).setOrigin(0.5, 0).setDepth(16);
    });

    this.updateDots();
  }

  // Perbarui warna dots sesuai progress hari
  updateDots() {
    const W = this.scale.width, H = this.scale.height;
    const dotSpacing = 44;
    const startX = W / 2 - ((DAYS.length - 1) / 2) * dotSpacing;
    const dotY = H - 28;

    this.dotGraphics.clear();

    DAYS.forEach((day, i) => {
      const x = startX + i * dotSpacing;
      const r = day.special ? 9 : 7;

      if (i < GameState.dayIndex) {
        // Sudah selesai — kuning penuh
        this.dotGraphics.fillStyle(0xf4a300, 1);
        this.dotGraphics.lineStyle(2, 0xb57000, 1);
      } else if (i === GameState.dayIndex) {
        // Aktif sekarang — putih dengan outline kuning
        this.dotGraphics.fillStyle(0xffffff, 1);
        this.dotGraphics.lineStyle(3, 0xf4a300, 1);
      } else {
        // Belum — transparan
        this.dotGraphics.fillStyle(0xffffff, 0.25);
        this.dotGraphics.lineStyle(2, 0xffffff, 0.5);
      }
      this.dotGraphics.fillCircle(x, dotY, r);
      this.dotGraphics.strokeCircle(x, dotY, r);
    });
  }

  // Perbarui teks HUD skor dan progress bar
  updateHUD() {
    const day = DAYS[GameState.dayIndex];
    const target = day.target || 10;

    this.dayText.setText('📅 ' + day.name);
    this.scoreText.setText(`🌾 ${GameState.score} / ${target}`);

    // Progress bar
    const bar = this.progressBarConfig;
    const prog = Math.min(GameState.score / target, 1);
    this.progressBar.clear();
    if (prog > 0) {
      this.progressBar.fillStyle(0xf4a300, 1);
      this.progressBar.fillRoundedRect(bar.x, bar.y, bar.w * prog, bar.h, 4);
    }
  }

  // ── Spawn manna baru dari atas ────────────────────────────
  spawnManna() {
    const day = DAYS[GameState.dayIndex];
    if (GameState.score >= (day.target || 10)) return; // sudah cukup

    const W = this.scale.width;
    const x = Phaser.Math.Between(30, W - 30);

    // Ambil dari pool atau buat baru
    const manna = this.mannaGroup.create(x, -30, 'manna');
    manna.setScale(0.7);
    manna.setDepth(8);

    // Kecepatan jatuh acak
    const speed = Phaser.Math.Between(120, 220);
    manna.setVelocityY(speed);

    // Gerakan sedikit ke kiri-kanan (wobble)
    const wobbleX = Phaser.Math.Between(-25, 25);
    manna.setVelocityX(wobbleX);

    // Rotasi saat jatuh
    manna.setAngularVelocity(Phaser.Math.Between(-80, 80));

    // Buang jika sudah keluar dari bawah layar
    manna.checkWorldBounds = true;
    manna.outOfBoundsKill = true;
  }

  // ── Callback saat pemain menangkap manna ─────────────────
  catchManna(player, manna) {
    // Efek partikel meledak di posisi manna
    this.particles.explode(10, manna.x, manna.y);

    // Hapus manna dari dunia
    manna.destroy();

    // Tambah skor
    GameState.score++;
    this.updateHUD();

    // Animasi "bounce" pada skor text
    this.tweens.add({
      targets: this.scoreText,
      scaleX: 1.3,
      scaleY: 1.3,
      duration: 80,
      yoyo: true
    });

    // Cek apakah target hari ini sudah terpenuhi
    const day = DAYS[GameState.dayIndex];
    if (GameState.score >= (day.target || 10)) {
      // Hentikan spawn dan pindah ke DayCompleteScene
      this.spawnTimer.remove();
      this.time.delayedCall(400, () => {
        this.scene.start('DayCompleteScene');
      });
    }
  }

  // ── Update loop (dipanggil setiap frame ~60fps) ────────────
  update(time, delta) {
    const SPEED = 300; // piksel per detik
    const player = this.player;

    // Reset velocity setiap frame
    player.setVelocityX(0);

    // Keyboard
    const goLeft  = this.cursors.left.isDown  || this.wasd.left.isDown;
    const goRight = this.cursors.right.isDown || this.wasd.right.isDown;

    // Sentuh / mouse
    const touchLeft  = this.touchDeltaX < -8;
    const touchRight = this.touchDeltaX > 8;

    if (goLeft || touchLeft) {
      player.setVelocityX(-SPEED);
      player.setFlipX(true);   // balik gambar ke kiri
    } else if (goRight || touchRight) {
      player.setVelocityX(SPEED);
      player.setFlipX(false);  // gambar ke kanan (normal)
    }

    // Gerakkan awan
    const W = this.scale.width;
    this.clouds.forEach(c => {
      c.x += c.speed * (delta / 1000);
      // Jika awan sudah lewat kanan, muncul lagi dari kiri
      if (c.x - 80 > W) c.x = -80;
    });
  }
}


// ============================================================
//  SCENE 4: DayCompleteScene
//  Tampil setelah target hari terpenuhi — ayat + tombol lanjut
// ============================================================
class DayCompleteScene extends Phaser.Scene {
  constructor() { super({ key: 'DayCompleteScene' }); }

  create() {
    const W = this.scale.width, H = this.scale.height;

    // Background game masih ada di belakang (semi-transparent overlay)
    const overlay = this.add.graphics();
    overlay.fillStyle(0xfde896, 0.97);
    overlay.fillRoundedRect(0, 0, W, H, 0);

    // Background langit tetap terlihat samar
    this.add.image(W / 2, 290, 'sky').setDisplaySize(W, 580).setAlpha(0.15);

    const day = DAYS[GameState.dayIndex];
    const isSaturday = day.special;
    const verse = GameState.getRandomVerse();

    // ── Emoji besar ──────────────────────────────────────────
    const emoji = this.add.text(W / 2, 90, isSaturday ? '⭐' : '😊', {
      fontSize: '56px'
    }).setOrigin(0.5);

    // Animasi emoji loncat
    this.tweens.add({
      targets: emoji,
      y: 80,
      duration: 600,
      ease: 'Bounce.easeOut'
    });

    // ── Judul ────────────────────────────────────────────────
    const titleTxt = isSaturday
      ? `Hebat! Bekal Besok Sudah Siap 🎉`
      : `Hore, Kamu Berhasil!`;

    this.add.text(W / 2, 165, titleTxt, {
      fontSize: '22px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#2a7a3a',
      fontStyle: 'bold',
      align: 'center',
      lineSpacing: 6
    }).setOrigin(0.5);

    // ── Panel ayat ───────────────────────────────────────────
    const vPanel = this.add.graphics();
    vPanel.fillStyle(0xffffff, 0.78);
    vPanel.fillRoundedRect(W / 2 - 165, 220, 330, 140, 16);
    vPanel.lineStyle(4, 0xf4a300, 1);
    vPanel.fillRoundedRect(W / 2 - 165, 220, 6, 140, { tl: 16, tr: 0, bl: 16, br: 0 });
    vPanel.strokeRoundedRect(W / 2 - 165, 220, 330, 140, 16);

    // Teks ayat (word-wrap agar tidak overflow)
    this.add.text(W / 2 - 148, 232, `"${verse.text}"`, {
      fontSize: '12.5px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#5a3800',
      wordWrap: { width: 295 },
      lineSpacing: 5
    });

    this.add.text(W / 2 + 148, 348, `— ${verse.ref}`, {
      fontSize: '11px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#b56a00',
      fontStyle: 'italic'
    }).setOrigin(1, 1);

    // ── Karakter pemain kecil di pojok ───────────────────────
    const heroDecor = this.add.image(W - 50, H - 130, 'player').setScale(1.1).setAlpha(0.7);
    this.tweens.add({
      targets: heroDecor,
      y: H - 140,
      duration: 1000,
      ease: 'Sine.easeInOut',
      yoyo: true,
      repeat: -1
    });

    // ── Tombol Lanjut ────────────────────────────────────────
    const isLastPlayDay = GameState.dayIndex === 5; // Sabtu = hari terakhir aktif
    const btnLabel = isLastPlayDay ? 'Minggu ▶' : 'Lanjut ▶';

    const btnBg = this.add.graphics();
    btnBg.fillStyle(0xf4a300, 1);
    btnBg.fillRoundedRect(W / 2 - 120, H - 160, 240, 58, 29);
    btnBg.lineStyle(3, 0xffd060, 1);
    btnBg.strokeRoundedRect(W / 2 - 120, H - 160, 240, 58, 29);

    const btnText = this.add.text(W / 2, H - 131, btnLabel, {
      fontSize: '22px',
      fontFamily: '"Comic Sans MS", cursive',
      color: '#ffffff',
      fontStyle: 'bold',
      stroke: '#0003',
      strokeThickness: 2
    }).setOrigin(0.5);

    const btnZone = this.add.zone(W / 2, H - 131, 240, 58).setInteractive({ cursor: 'pointer' });
    btnZone.on('pointerover', () => { btnBg.setScale(1.05); btnText.setScale(1.05); });
    btnZone.on('pointerout',  () => { btnBg.setScale(1);    btnText.setScale(1);    });
    btnZone.on('pointerdown', () => this.goNext());

    // Dots progress
    this.createDayDots(W, H);
  }

  // Tombol Lanjut ditekan → tentukan Scene berikutnya
  goNext() {
    if (GameState.dayIndex >= 5) {
      // Sesudah Sabtu → tampilkan Hari Minggu (istirahat)
      this.scene.start('SundayScene');
    } else {
      // Lanjut ke hari berikutnya
      GameState.dayIndex++;
      GameState.score = 0;
      this.scene.start('GameScene');
    }
  }

  createDayDots(W, H) {
    const dotSpacing = 44;
    const startX = W / 2 - ((DAYS.length - 1) / 2) * dotSpacing;
    const dotY = H - 28;
    const g = this.add.graphics();

    DAYS.forEach((day, i) => {
      const x = startX + i * dotSpacing;
      const r = day.special ? 9 : 7;
      if (i <= GameState.dayIndex) {
        g.fillStyle(0xf4a300, 1); g.lineStyle(2, 0xb57000, 1);
      } else {
        g.fillStyle(0xffffff, 0.25); g.lineStyle(2, 0xffffff, 0.5);
      }
      g.fillCircle(x, dotY, r);
      g.strokeCircle(x, dotY, r);

      this.add.text(x, dotY + r + 2, day.short, {
        fontSize: '8px', fontFamily: '"Comic Sans MS", cursive',
        color: 'rgba(100,50,0,0.9)', fontStyle: 'bold'
      }).setOrigin(0.5, 0);
    });
  }
}

    // Pesan moral

      '',
      'Kita tidak perlu khawatir atau serakah.',
      'Cukuplah untuk hari ini —',
      'besok Tuhan akan mencukupkan lagi! 🙏',
    ];
    moralLines.forEach((line, i) => {

      this.add.text(W / 2, 162 + i * 24, line, {

        color: '#5a3800',

        align: 'center',
        wordWrap: { width: 310 }

    btnBg.lineStyle(3, 0xffd060, 1);
    btnBg.strokeRoundedRect(W / 2 - 130, H - 160, 260, 60, 30);

    const btnText = this.add.text(W / 2, H - 130, 'Main Lagi 🔄', {
      fontSize: '22px', fontFamily: '"Comic Sans MS", cursive',
      color: '#ffffff', fontStyle: 'bold',
      stroke: '#0003', strokeThickness: 2
    }).setOrigin(0.5);

    const btnZone = this.add.zone(W / 2, H - 130, 260, 60).setInteractive({ cursor: 'pointer' });

      this.scene.start('StartScene');

    this.spawnStars(W, H);

  spawnStars(W, H) {
    for (let i = 0; i < 12; i++) {
      const m = this.add.image(
        Phaser.Math.Between(0, W),
        Phaser.Math.Between(0, H),
        'manna'
      ).setScale(Phaser.Math.FloatBetween(0.2, 0.5)).setAlpha(0.5);

      this.tweens.add({
        targets: m,
        y: m.y + Phaser.Math.Between(20, 60),
        alpha: 0,
        duration: Phaser.Math.Between(1500, 3000),
        delay: Phaser.Math.Between(0, 1200),
        repeat: -1,
        repeatDelay: Phaser.Math.Between(500, 1500),
        onRepeat: () => {
          m.x = Phaser.Math.Between(0, W);
          m.y = -20;
          m.alpha = 0.5;
        }
      });
    }
  }

  createDayDots(W, H) {
    const dotSpacing = 44;
    const startX = W / 2 - ((DAYS.length - 1) / 2) * dotSpacing;
    const dotY = H - 28;
    const g = this.add.graphics();
    DAYS.forEach((day, i) => {
      const x = startX + i * dotSpacing;
      const r = day.special ? 9 : 7;
      g.fillStyle(0xf4a300, 1); g.lineStyle(2, 0xb57000, 1);
      g.fillCircle(x, dotY, r);
      g.strokeCircle(x, dotY, r);
      this.add.text(x, dotY + r + 2, day.short, {
        fontSize: '8px', fontFamily: '"Comic Sans MS", cursive',
        color: 'rgba(100,50,0,0.9)', fontStyle: 'bold'
      }).setOrigin(0.5, 0);
    });
  }
}


// ============================================================
//  KONFIGURASI PHASER
//  Di sinilah semua Scene didaftarkan dan ukuran canvas diatur
// ============================================================
const config = {
  type: Phaser.AUTO,  // Otomatis pilih WebGL atau Canvas

  // Ukuran canvas (piksel)
  width: 480,
  height: 700,

  // Responsif: skala agar muat di layar
  scale: {
    mode: Phaser.Scale.FIT,          // Sesuaikan ke layar tanpa distorsi
    autoCenter: Phaser.Scale.CENTER_BOTH,  // Tengahkan horizontal + vertikal
    parent: 'game-container',        // ID elemen HTML wadah game
  },

  // Physics: Arcade (ringan, cocok untuk game 2D sederhana)
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 0 },  // Tidak ada gravitasi global; manna punya velocity sendiri
      debug: false         // Ganti true untuk melihat hitbox saat debugging
    }
  },

  // Daftar Scene (urutan = urutan load; yang pertama dijalankan otomatis)
  scene: [
    BootScene,         // 1. Generate semua texture
    StartScene,        // 2. Layar pembuka
    GameScene,         // 3. Permainan utama
    DayCompleteScene,  // 4. Layar selesai per hari
    SundayScene        // 5. Layar akhir Minggu
  ],

  // Latar belakang canvas (di belakang semua Scene)
