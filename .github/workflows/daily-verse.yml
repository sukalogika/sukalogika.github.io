name: Daily Verse - Image + Video

on:
  schedule:
    - cron: '0 0 * * *'   # Jam 7 pagi WIB (00:00 UTC)
  workflow_dispatch:

jobs:
  generate-image:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install canvas dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential

      - name: Install packages
        run: npm install canvas axios

      - name: Generate image
        run: node scripts/generate-quote.js

      - name: Push image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add vod-image/
          git commit -m "📸 Daily image $(date '+%Y-%m-%d')" || echo "No changes"
          git push

  generate-video:
    needs: generate-image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install packages
        run: npm install axios fluent-ffmpeg

      - name: Pull latest changes
        run: git pull origin main

      - name: Create video
        run: node scripts/create-video.js

      - name: Upload video as artifact (download here)
        uses: actions/upload-artifact@v4
        with:
          name: daily-video-${{ github.run_id }}
          path: videos/*.mp4

      - name: Push video to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git commit -m "🎬 Daily video $(date '+%Y-%m-%d')" || echo "No changes"
          git push
