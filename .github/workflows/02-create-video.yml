name: Create Daily Verse Video

on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC = 07:30 WIB
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install dependencies
        run: npm install axios fluent-ffmpeg
      
      - name: Generate quote image (if not exists)
        run: node scripts/generate-quote.js
      
      - name: Create video from verse
        run: node scripts/create-video.js
      
      - name: Commit and push video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/ vod-image/
          git diff --quiet && git diff --staged --quiet || git commit -m "🎬 Add daily verse video for $(date '+%Y-%m-%d')"
          git push
