name: 02 - Generate Video

on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC = 07:30 WIB (nunggu 30 menit setelah gambar)
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg
      
      - name: Install packages
        run: npm install axios fluent-ffmpeg
      
      - name: Pull latest changes (ambil gambar yang udah digenerate)
        run: git pull origin main
      
      - name: Create video
        run: node scripts/create-video-direct.js
      
      - name: Push video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git commit -m "🎬 Generate video $(date '+%Y-%m-%d')" || echo "No changes"
          git push
