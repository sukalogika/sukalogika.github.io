name: Create Daily Verse Video

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libjpeg-dev \
            libpango1.0-dev \
            libgif-dev \
            build-essential
      
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg
      
      - name: Install npm packages
        run: npm install axios fluent-ffmpeg canvas   # ← TAMBAHKAN canvas di sini!
      
      - name: Generate quote image
        run: node scripts/generate-quote.js
      
      - name: Create video from verse
        run: node scripts/create-video.js
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/ vod-image/
          git diff --quiet && git diff --staged --quiet || git commit -m "🎬 Daily verse video $(date '+%Y-%m-%d')"
          git push
