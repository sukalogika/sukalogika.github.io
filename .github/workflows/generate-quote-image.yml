name: Generate Alkitab Quote Image

on:
  schedule:
    # Jalankan setiap hari jam 00:00 UTC (sesuaikan)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Bisa dijalankan manual dari tab Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Untuk push gambar ke repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install canvas axios

      - name: Run quote image generator
        run: node scripts/generate-quote.js

      - name: Commit and push generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated-images/
          git diff --quiet && git diff --staged --quiet || git commit -m "Add generated quote image [skip ci]"
          git push
