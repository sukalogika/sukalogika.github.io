name: Generate Alkitab Quote Image

on:
  schedule:
    - cron: '0 0 * * *'   # UTC . jadijam 7 wib
  workflow_dispatch:         # Tetap bisa di-run manual kapan aja

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libjpeg-dev \
            libpango1.0-dev \
            libgif-dev \
            build-essential

      - name: Install npm packages
        run: npm install canvas axios

      - name: Generate quote image
        run: node scripts/generate-quote.js

      - name: Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vod-image/
          git diff --quiet && git diff --staged --quiet || git commit -m "📸 Add VOD image for $(date '+%Y-%m-%d %H:%M:%S')"
          git push
