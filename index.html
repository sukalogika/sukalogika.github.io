<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sukalogika</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            color: #111;
            font-family: 'Poppins', sans-serif;
        }

        .container-box {
            max-width: 480px;
            margin: auto;
            padding: 50px 20px;
            text-align: center;
        }

        .title {
            font-weight: 600;
            font-size: 26px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 25px;
        }

        .verse {
            font-size: 14px;
            font-style: italic;
            color: #444;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-custom {
            width: 100%;
            margin-bottom: 14px;
            border-radius: 12px;
            padding: 12px;
            font-weight: 500;
            border: 1px solid #ddd;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        .btn-custom:hover {
            background-color: #111;
            color: #fff;
            border-color: #111;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container-box">

    <div class="title">sukalogika</div>
    <div class="subtitle">Henky Adlin Shan</div>

    <div id="verse" class="verse"></div>

    <!-- Links -->
    <a href="https://youtube.com/@sukalogika/" target="_blank" class="btn btn-custom">YouTube</a>
    <a href="https://www.tiktok.com/@sukalogika" target="_blank" class="btn btn-custom">TikTok</a>
    <a href="https://www.instagram.com/sukalogika" target="_blank" class="btn btn-custom">Instagram</a>

    <div class="footer">
        Ujilah segala sesuatu dan peganglah yang baik
    </div>

</div>

<script>
    var verses = [
        "Yeremia 29:11 - Rancangan-Ku adalah damai sejahtera.",
        "Mazmur 23:1 - Tuhan adalah gembalaku.",
        "Roma 8:28 - Allah turut bekerja dalam segala sesuatu.",
        "Filipi 4:13 - Segala perkara dapat kutanggung.",
        "Amsal 3:5 - Percayalah kepada Tuhan.",
        "Yesaya 40:31 - Yang menanti Tuhan mendapat kekuatan.",
        "Yohanes 16:33 - Aku telah mengalahkan dunia.",
        "Mazmur 46:2 - Allah itu tempat perlindungan.",
        "Ibrani 11:1 - Iman adalah dasar dari segala sesuatu.",
        "Yakobus 1:5 - Mintalah hikmat.",
        "Mazmur 34:19 - Tuhan melepaskan dari semuanya.",
        "Yohanes 3:16 - Karena begitu besar kasih Allah.",
        "Roma 12:2 - Berubahlah oleh pembaharuan budimu.",
        "Kolose 3:23 - Lakukan seperti untuk Tuhan.",
        "Galatia 6:9 - Jangan jemu berbuat baik.",
        "Mazmur 37:5 - Serahkan hidupmu kepada Tuhan.",
        "Yesaya 41:10 - Jangan takut, Aku menyertai.",
        "2 Korintus 5:7 - Hidup oleh iman.",
        "Efesus 2:8 - Diselamatkan oleh kasih karunia.",
        "Mazmur 119:105 - Firman-Mu pelita bagi kakiku.",
        "Amsal 16:3 - Serahkan perbuatanmu kepada Tuhan.",
        "Filipi 4:6 - Jangan khawatir.",
        "1 Petrus 5:7 - Serahkan kekhawatiranmu.",
        "Yohanes 14:27 - Damai sejahtera-Ku kuberikan.",
        "Roma 15:13 - Allah sumber pengharapan.",
        "Mazmur 121:2 - Pertolonganku dari Tuhan.",
        "2 Timotius 1:7 - Roh yang membangkitkan kekuatan.",
        "Ibrani 13:5 - Aku tidak akan meninggalkan engkau.",
        "Wahyu 21:4 - Tidak ada lagi air mata.",
        "Matius 11:28 - Marilah kepada-Ku."
    ];

    var today = new Date().getDate();
    var index = (today - 1) % verses.length;

    document.getElementById("verse").innerText = verses[index];
</script>

</body>
</html>
