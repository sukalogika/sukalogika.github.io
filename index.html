<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sukalogika</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            font-family: 'Poppins', sans-serif;
        }

        .container-box {
            max-width: 480px;
            margin: auto;
            padding: 40px 20px;
            text-align: center;
        }

        .title {
            font-weight: 600;
            font-size: 24px;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .verse {
            font-size: 14px;
            font-style: italic;
            color: #ccc;
            margin-bottom: 30px;
        }

        .btn-custom {
            width: 100%;
            margin-bottom: 12px;
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container-box">

    <div class="title">sukalogika</div>
    <div class="subtitle">Henky Adlin Shan</div>

    <div id="verse" class="verse"></div>

    <!-- Links -->
    <a href="https://youtube.com/@sukalogika/" target="_blank" class="btn btn-light btn-custom">YouTube</a>
    <a href="https://www.tiktok.com/@sukalogika" target="_blank" class="btn btn-light btn-custom">TikTok</a>
    <a href="https://www.instagram.com/sukalogika" target="_blank" class="btn btn-light btn-custom">Instagram</a>

    <div class="footer">
        Ujilah segala sesuatu dan peganglah yang baik
    </div>

</div>

<script>
    var verses = [
        "1. Yeremia 29:11 - Rancangan-Ku adalah damai sejahtera.",
        "2. Mazmur 23:1 - Tuhan adalah gembalaku.",
        "3. Roma 8:28 - Allah turut bekerja dalam segala sesuatu.",
        "4. Filipi 4:13 - Segala perkara dapat kutanggung.",
        "5. Amsal 3:5 - Percayalah kepada Tuhan.",
        "6. Yesaya 40:31 - Yang menanti Tuhan mendapat kekuatan.",
        "7. Yohanes 16:33 - Aku telah mengalahkan dunia.",
        "8. Mazmur 46:2 - Allah itu tempat perlindungan.",
        "9. Ibrani 11:1 - Iman adalah dasar dari segala sesuatu.",
        "10. Yakobus 1:5 - Mintalah hikmat.",
        "11. Mazmur 34:19 - Tuhan melepaskan dari semuanya.",
        "12. Yohanes 3:16 - Karena begitu besar kasih Allah.",
        "13. Roma 12:2 - Berubahlah oleh pembaharuan budimu.",
        "14. Kolose 3:23 - Lakukan seperti untuk Tuhan.",
        "15. Galatia 6:9 - Jangan jemu berbuat baik.",
        "16. Mazmur 37:5 - Serahkan hidupmu kepada Tuhan.",
        "17. Yesaya 41:10 - Jangan takut, Aku menyertai.",
        "18. 2 Korintus 5:7 - Hidup oleh iman.",
        "19. Efesus 2:8 - Diselamatkan oleh kasih karunia.",
        "20. Mazmur 119:105 - Firman-Mu pelita bagi kakiku.",
        "21. Amsal 16:3 - Serahkan perbuatanmu kepada Tuhan.",
        "22. Filipi 4:6 - Jangan khawatir.",
        "23. 1 Petrus 5:7 - Serahkan kekhawatiranmu.",
        "24. Yohanes 14:27 - Damai sejahtera-Ku kuberikan.",
        "25. Roma 15:13 - Allah sumber pengharapan.",
        "26. Mazmur 121:2 - Pertolonganku dari Tuhan.",
        "27. 2 Timotius 1:7 - Roh yang membangkitkan kekuatan.",
        "28. Ibrani 13:5 - Aku tidak akan meninggalkan engkau.",
        "29. Wahyu 21:4 - Tidak ada lagi air mata.",
        "30. Matius 11:28 - Marilah kepada-Ku."
    ];

    var today = new Date().getDate(); // 1 - 31
    var index = (today - 1) % verses.length;

    document.getElementById("verse").innerText = verses[index];
</script>

</body>
</html>
