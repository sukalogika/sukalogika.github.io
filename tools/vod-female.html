<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verse of the Day — Alkitab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:    #C9748C;
    --rose-lt: #F2D6DE;
    --rose-dk: #8C4A5E;
    --blush:   #F7EEF1;
    --cream:   #FDF8F5;
    --sand:    #E8DDD4;
    --text:    #2E1F27;
    --muted:   #8C7079;
    --gold:    #C9A96E;
  }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 60px;
  }

  /* ── TOP BANNER ── */
  .top-banner {
    width: 100%;
    max-width: 600px;
    text-align: center;
    padding: 52px 0 32px;
  }
  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }
  .site-subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0 36px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--sand);
  }
  .divider-icon {
    width: 20px; height: 20px;
    fill: none;
    stroke: var(--gold);
    stroke-width: 1.5;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 600px;
    background: #fff;
    border: 1px solid var(--rose-lt);
    border-radius: 20px;
    padding: 40px 44px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rose-lt), var(--gold), var(--rose-lt));
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 500;
    margin-bottom: 20px;
  }

  /* ── GENERATE BUTTON ── */
  .btn-generate {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-bottom: 28px;
  }
  .btn-generate:hover { background: var(--rose-dk); }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { background: var(--sand); color: var(--muted); cursor: default; transform: none; }
  .btn-generate svg { width: 18px; height: 18px; }

  /* ── LOADING / STATUS ── */
  .status-area {
    min-height: 22px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 20px;
    transition: opacity 0.3s;
  }

  /* ── LOADER DOTS ── */
  .dots { display: inline-flex; gap: 6px; }
  .dots span {
    width: 7px; height: 7px;
    background: var(--rose);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── VERSE PREVIEW ── */
  .verse-preview {
    display: none;
    margin-bottom: 24px;
  }
  .verse-ref {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .verse-ref::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--rose-lt);
  }
  .verse-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    line-height: 1.7;
    color: var(--text);
    font-style: italic;
    margin-bottom: 20px;
  }
  .verse-sep {
    width: 40px; height: 1px;
    background: var(--sand);
    margin: 0 auto 20px;
  }

  /* ── PATTERN CHIP ── */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    background: var(--blush);
    border-radius: 20px;
    font-size: 12px;
    color: var(--rose-dk);
    font-weight: 500;
  }
  .chip svg { width: 13px; height: 13px; stroke: var(--rose); fill: none; }

  /* ── DOWNLOAD BTN ── */
  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    padding: 14px;
    background: var(--blush);
    color: var(--rose-dk);
    border: 1px solid var(--rose-lt);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.2s;
  }
  .btn-download:hover { background: var(--rose-lt); }
  .btn-download svg { width: 16px; height: 16px; stroke: var(--rose-dk); fill: none; }

  /* ── FEATURES ROW ── */
  .features {
    width: 100%;
    max-width: 600px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 24px;
  }
  .feature-item {
    background: #fff;
    border: 1px solid var(--rose-lt);
    border-radius: 14px;
    padding: 18px 14px;
    text-align: center;
  }
  .feature-icon {
    width: 32px; height: 32px;
    background: var(--blush);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
  }
  .feature-icon svg { width: 16px; height: 16px; stroke: var(--rose); fill: none; stroke-width: 1.8; }
  .feature-label {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 40px;
    font-size: 11px;
    color: var(--sand);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="top-banner">
  <p class="wordmark">Verse of the Day</p>
  <h1 class="site-title">Alkitab<br>Quote Generator</h1>
  <p class="site-subtitle">Ayat harian yang indah, siap dibagikan ke Instagram.</p>
</div>

<div class="divider">
  <svg class="divider-icon" viewBox="0 0 24 24"><path d="M12 2 L13.5 8 L20 8 L14.5 12.5 L16.5 19 L12 15 L7.5 19 L9.5 12.5 L4 8 L10.5 8 Z"/></svg>
</div>

<div class="card">
  <p class="card-label">Buat gambar ayat harimu</p>

  <button class="btn-generate" id="generateBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v1m0 16v1M4.22 4.22l.7.7m12.16 12.16.7.7M3 12h1m16 0h1M4.22 19.78l.7-.7m12.16-12.16.7-.7"/><circle cx="12" cy="12" r="4"/></svg>
    Generate Ayat Hari Ini
  </button>

  <div class="status-area" id="statusArea"></div>

  <div class="verse-preview" id="versePreview">
    <div class="verse-ref" id="verseRef"></div>
    <p class="verse-text" id="verseText"></p>
    <div class="verse-sep"></div>
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
      <div class="chip" id="patternChip">
        <svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span id="patternName"></span>
      </div>
      <span style="font-size:11px; color:var(--muted);">1080 × 1920 px</span>
    </div>
    <button class="btn-download" id="downloadBtn">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 4v12m0 0-4-4m4 4 4-4M4 20h16"/></svg>
      Unduh Gambar PNG
    </button>
  </div>
</div>

<div class="features">
  <div class="feature-item">
    <div class="feature-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>
    </div>
    <p class="feature-label">10 pola latar berbeda setiap klik</p>
  </div>
  <div class="feature-item">
    <div class="feature-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    </div>
    <p class="feature-label">Ayat terbaru langsung dari API SABDA</p>
  </div>
  <div class="feature-item">
    <div class="feature-icon">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
    </div>
    <p class="feature-label">Siap upload ke Instagram Stories</p>
  </div>
</div>

<p class="footer">© SABDA.org · LAI 1974 · Gambar dibuat di browser Anda</p>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
  const apiUrl = 'https://alkitab.sabda.org/api/vod.php?format=jsonp';
  let lastDataURL = null;
  let lastTitle = null;

  const backgroundPatterns = [
    { name: 'Dot Grid', draw: (ctx, w, h) => {
        ctx.fillStyle = '#0a0508'; ctx.fillRect(0,0,w,h);
        ctx.fillStyle = 'rgba(201,116,140,0.12)';
        const s = 42;
        for (let x=0;x<w;x+=s) for (let y=0;y<h;y+=s) { ctx.beginPath();ctx.arc(x,y,2.2,0,Math.PI*2);ctx.fill(); }
    }},
    { name: 'Diagonal Lines', draw: (ctx, w, h) => {
        ctx.fillStyle = '#080308'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,116,140,0.09)'; ctx.lineWidth=1.2;
        for (let i=-h;i<w+h;i+=26) { ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+h,h);ctx.stroke(); }
    }},
    { name: 'Fine Grid', draw: (ctx, w, h) => {
        ctx.fillStyle='#060306'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,169,110,0.08)'; ctx.lineWidth=1;
        const step=52;
        for (let x=0;x<=w;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
        for (let y=0;y<=h;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
    }},
    { name: 'Hexagonal Mesh', draw: (ctx, w, h) => {
        ctx.fillStyle='#050205'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,116,140,0.10)'; ctx.lineWidth=1;
        const r=40, cols=Math.ceil(w/(r*1.5))+2, rows=Math.ceil(h/(r*Math.sqrt(3)))+2;
        for (let q=-1;q<cols;q++) for (let p=-1;p<rows;p++) {
          const cx=q*r*1.5, cy=p*r*Math.sqrt(3)+(q%2)*r*Math.sqrt(3)/2;
          ctx.beginPath();
          for (let s=0;s<6;s++){const a=Math.PI/3*s;s===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
          ctx.closePath(); ctx.stroke();
        }
    }},
    { name: 'Chevron Wave', draw: (ctx, w, h) => {
        ctx.fillStyle='#060306'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,116,140,0.08)'; ctx.lineWidth=1.5;
        for (let y=-40;y<h+40;y+=38) {
          ctx.beginPath();
          for (let x=0;x<=w;x+=2){const yy=y+Math.sin((x/w)*Math.PI*8)*14;x===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy);}
          ctx.stroke();
        }
    }},
    { name: 'Noise Scatter', draw: (ctx, w, h) => {
        ctx.fillStyle='#060306'; ctx.fillRect(0,0,w,h);
        for (let i=0;i<700;i++){
          const x=Math.random()*w,y=Math.random()*h,r=Math.random()*2.5+0.5,a=Math.random()*0.12+0.03;
          ctx.fillStyle=`rgba(201,116,140,${a})`;
          ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
        }
    }},
    { name: 'Concentric Circles', draw: (ctx, w, h) => {
        ctx.fillStyle='#050205'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,169,110,0.07)'; ctx.lineWidth=1;
        const cx=w/2, cy=h/2, maxR=Math.sqrt(cx*cx+cy*cy)+100;
        for (let r=40;r<maxR;r+=48){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();}
    }},
    { name: 'Crosshatch', draw: (ctx, w, h) => {
        ctx.fillStyle='#060306'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,116,140,0.06)'; ctx.lineWidth=1;
        const gap=32;
        for (let i=-h;i<w+h;i+=gap){
          ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+h,h);ctx.stroke();
          ctx.beginPath();ctx.moveTo(i,h);ctx.lineTo(i+h,0);ctx.stroke();
        }
    }},
    { name: 'Triangle Mesh', draw: (ctx, w, h) => {
        ctx.fillStyle='#060306'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,169,110,0.07)'; ctx.lineWidth=1;
        const size=60, rows=Math.ceil(h/size)+1, cols=Math.ceil(w/(size/2))+1;
        for (let row=0;row<rows;row++) for (let col=0;col<cols;col++){
          const x=col*(size/2),y=row*size,off=(col%2)*(size/2);
          ctx.beginPath();ctx.moveTo(x,y+off);ctx.lineTo(x+size/2,y+off+size);ctx.lineTo(x-size/2,y+off+size);ctx.closePath();ctx.stroke();
        }
    }},
    { name: 'Radial Rays', draw: (ctx, w, h) => {
        ctx.fillStyle='#050205'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(201,116,140,0.06)'; ctx.lineWidth=1;
        const cx=w/2,cy=h/2,rays=36,maxR=Math.sqrt(w*w+h*h);
        for (let i=0;i<rays;i++){
          const angle=(Math.PI*2/rays)*i;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle)*maxR,cy+Math.sin(angle)*maxR);ctx.stroke();
        }
    }},
  ];

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    if (!text) return [];
    const words = text.split(' ');
    let line = '', lines = [];
    for (let n = 0; n < words.length; n++) {
      const test = line + words[n] + ' ';
      if (ctx.measureText(test).width > maxWidth && n > 0) { lines.push(line); line = words[n] + ' '; }
      else line = test;
    }
    lines.push(line);
    return lines;
  }

  function cleanText(t) {
    if (!t) return '';
    return t.replace(/^"|"$/g,'').replace(/\\"/g,'"').trim();
  }

  function fetchVerseData() {
    return new Promise((resolve, reject) => {
      const cb = 'jsonp_' + Date.now();
      const script = document.createElement('script');
      window[cb] = (data) => { delete window[cb]; document.body.removeChild(script); resolve(data); };
      script.onerror = () => { delete window[cb]; document.body.removeChild(script); reject(new Error('Gagal mengambil data dari API.')); };
      script.src = `${apiUrl}&callback=${cb}`;
      document.body.appendChild(script);
    });
  }

  function generateImage(verseData) {
    return new Promise((resolve, reject) => {
      try {
        const rawText = verseData.html?.text || '';
        const passage = verseData.html?.passage || 'Alkitab';
        let cleanVerse = cleanText(rawText) || 'Kamu adalah garam dunia... (Matius 5:13)';
        const title = passage;

        const canvas = document.getElementById('hiddenCanvas');
        canvas.width = 1080;
        canvas.height = 1920;
        const ctx = canvas.getContext('2d');

        const pat = backgroundPatterns[Math.floor(Math.random() * backgroundPatterns.length)];
        pat.draw(ctx, 1080, 1920);

        const vig = ctx.createRadialGradient(540, 960, 150, 540, 960, 1050);
        vig.addColorStop(0, 'rgba(0,0,0,0)');
        vig.addColorStop(1, 'rgba(0,0,0,0.6)');
        ctx.fillStyle = vig; ctx.fillRect(0, 0, 1080, 1920);

        ctx.fillStyle = 'rgba(201,116,140,0.18)';
        ctx.fillRect(0, 0, 1080, 1920);

        ctx.fillStyle = 'rgba(201,116,140,0.55)';
        ctx.font = "bold 260px Georgia, serif";
        ctx.fillText('\u201C', 70, 300);

        const refY = 390;
        ctx.fillStyle = '#C9748C';
        ctx.font = "400 38px Georgia, serif";
        let refLines = wrapText(ctx, title, 100, refY, 880, 55);
        let y = refY;
        refLines.forEach(l => { ctx.fillText(l, 100, y); y += 55; });

        y += 30;
        ctx.fillStyle = 'rgba(201,116,140,0.4)';
        ctx.fillRect(100, y, 50, 1);
        y += 30;

        ctx.fillStyle = '#F2D6DE';
        ctx.font = "italic 400 50px Georgia, serif";
        let vLines = wrapText(ctx, cleanVerse, 100, y, 880, 78);
        vLines.forEach(l => { ctx.fillText(l, 100, y); y += 78; });

        y += 50;
        ctx.fillStyle = 'rgba(201,169,110,0.5)';
        ctx.fillRect(100, y, 60, 1);

        ctx.fillStyle = '#8C7079';
        ctx.font = "300 32px 'DM Sans', Georgia, sans-serif";
        ctx.fillText('@sukalogika', 100, 1820);

        const dataURL = canvas.toDataURL('image/png');
        resolve({ dataURL, title, patternName: pat.name });
      } catch(e) { reject(e); }
    });
  }

  async function onGenerate() {
    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('statusArea');
    const preview = document.getElementById('versePreview');

    btn.disabled = true;
    preview.style.display = 'none';
    status.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    try {
      const data = await fetchVerseData();
      const { dataURL, title, patternName } = await generateImage(data);
      lastDataURL = dataURL;
      lastTitle = title;

      const rawText = data.html?.text || '';
      document.getElementById('verseRef').textContent = title;
      document.getElementById('verseText').textContent = cleanText(rawText) || '—';
      document.getElementById('patternName').textContent = patternName;

      status.innerHTML = '';
      preview.style.display = 'block';
    } catch(e) {
      status.innerHTML = `<span style="color:#C9748C;">Gagal: ${e.message}</span>`;
    } finally {
      btn.disabled = false;
    }
  }

  function onDownload() {
    if (!lastDataURL) return;
    const link = document.createElement('a');
    link.download = `alkitab_${(lastTitle||'quote').replace(/[^a-z0-9]/gi,'_').toLowerCase()}.png`;
    link.href = lastDataURL;
    link.click();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('generateBtn').addEventListener('click', onGenerate);
    document.getElementById('downloadBtn').addEventListener('click', onDownload);
  });
</script>
</body>
</html>
