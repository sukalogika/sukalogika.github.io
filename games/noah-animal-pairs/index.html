        const COLORS = { bg: '#020617', accent: '#38BDF8' };
        const LEVELS = {
            easy: { r: 3, c: 4, lbl: 'BEGINNER' },
            medium: { r: 4, c: 4, lbl: 'VOYAGER' },
            hard: { r: 5, c: 4, lbl: 'NOAH’S MISSION' }
        };
        const CARD_SIZE = 120;

        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                const { width, height } = this.cameras.main;
                this.add.rectangle(width/2, height/2, width, height, 0x020617);
                this.add.text(width/2, height/2, 'PREPARING THE ARK...', { fontSize: '24px', color: COLORS.accent }).setOrigin(0.5);

                // --- ASSET LOADER ---
                // Ganti URL ke file lokal jika sudah diupload ke folder assets
                this.load.audio('bgm', 'assets/audio/bgm.mp3'); 
                this.load.audio('sfx_flip', 'assets/audio/flip.mp3');
                this.load.audio('sfx_win', 'assets/audio/win.mp3');
                this.load.image('win_ark', 'assets/img/win_image.jpg'); 
                
                // Mencegah error loading menghentikan game
                this.load.on('loaderror', (file) => {
                    console.warn(`Lapor: Asset "${file.key}" tidak ditemukan atau gagal dimuat.`);
                });

                this.prepareTextures();
            }
            create() { this.scene.start('MenuScene'); }

            prepareTextures() {
                const g = this.add.graphics();
                g.fillStyle(0x1e293b, 1).fillRoundedRect(0, 0, CARD_SIZE, CARD_SIZE, 16);
                g.lineStyle(4, 0x38bdf8, 0.4).strokeRoundedRect(4, 4, CARD_SIZE-8, CARD_SIZE-8, 12);
                const qT = this.add.text(CARD_SIZE/2, CARD_SIZE/2, '?', { fontSize: '48px', color: '#38bdf8', fontStyle: 'bold' }).setOrigin(0.5).setAlpha(0.2);
                const rt = this.add.renderTexture(0, 0, CARD_SIZE, CARD_SIZE);
                rt.draw(g, 0, 0); rt.draw(qT, CARD_SIZE/2, CARD_SIZE/2);
                rt.saveTexture('cBack'); g.clear(); qT.destroy();
                g.fillStyle(0xf8fafc, 1).fillRoundedRect(0, 0, CARD_SIZE, CARD_SIZE, 16);
                g.generateTexture('cFront', CARD_SIZE, CARD_SIZE); g.destroy();

                SVG_ICONS.forEach((svg, i) => {
                    const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const img = new Image();
                    img.onload = () => {
                        const hRes = 450;
                        const canvas = document.createElement('canvas');
                        canvas.width = hRes; canvas.height = hRes;
                        const ctx = canvas.getContext('2d');
                        
						
						const scale = 1.15; // 1.1 – 1.2 aman

const drawW = hRes * scale;
const drawH = hRes * scale;
const offsetX = (hRes - drawW) / 2;
const offsetY = (hRes - drawH) / 2;

ctx.drawImage(img, offsetX, offsetY, drawW, drawH);


                        if (this.textures.exists(`icon_${i}`)) this.textures.remove(`icon_${i}`);
                        this.textures.addCanvas(`icon_${i}`, canvas);
                        URL.revokeObjectURL(url);
                    };
                    img.src = url;
                });
            }
        }

        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            create() {
                const { width, height } = this.cameras.main;
                this.add.graphics().fillGradientStyle(0x020617, 0x020617, 0x1e293b, 0x1e293b, 1).fillRect(0, 0, width, height);
                
                // Title & Tagline
                this.add.text(width / 2, 180, 'Noah’s Animal Pairing', { fontSize: '38px', fontStyle: 'bold', color: '#fff' }).setOrigin(0.5);
                this.add.text(width / 2, 230, 'Help Noah rescue pairs before the flood!', { fontSize: '18px', color: COLORS.accent, fontStyle: 'italic' }).setOrigin(0.5);

                const footerText = '© 2026 Henky Adlin Shan - sukalogika.com - MIT License';
                this.add.text(width / 2, height - 40, footerText, { fontSize: '11px', color: '#64748b' }).setOrigin(0.5);

                ['easy', 'medium', 'hard'].forEach((key, i) => {
                    const btn = this.add.container(width / 2, 380 + i * 95);
                    const shape = this.add.graphics().fillStyle(0xffffff, 0.03).fillRoundedRect(-180, -30, 360, 60, 15).lineStyle(1, 0xffffff, 0.1).strokeRoundedRect(-180, -30, 360, 60, 15);
                    const txt = this.add.text(0, 0, LEVELS[key].lbl, { fontSize: '20px', fontStyle: 'bold' }).setOrigin(0.5);
                    btn.add([shape, txt]);
                    btn.setInteractive(new Phaser.Geom.Rectangle(-180, -30, 360, 60), Phaser.Geom.Rectangle.Contains);
                    
                    btn.on('pointerdown', () => {
                        this.initAndPlayBGM();
                        this.safePlay('sfx_flip');
                        this.scene.start('GameScene', { level: key });
                    });
                });
                
                this.input.once('pointerdown', () => this.initAndPlayBGM());
            }

            initAndPlayBGM() {
                if (this.cache.audio.exists('bgm')) {
                    const bgm = this.sound.get('bgm') || this.sound.add('bgm', { loop: true, volume: 0.4 });
                    if (!bgm.isPlaying) bgm.play();
                }
            }

            safePlay(key, config = { volume: 0.5 }) {
                if (this.cache.audio.exists(key)) {
                    try { this.sound.play(key, config); } catch(e) {}
                }
            }
        }

        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }
            init(d) { 
                this.lvl = d.level; 
                this.sel = []; 
                this.mtch = 0; 
                this.active = true; 
                this.start = 0; 
                this.timer = 0;
                this.inputLocked = false; // Lock khusus buat cegah klik brutal
            }
            create() {
                const { width, height } = this.cameras.main;
                const conf = LEVELS[this.lvl]; this.total = (conf.r * conf.c) / 2;
                this.add.graphics().fillGradientStyle(0x020617, 0x020617, 0x1e293b, 0x1e293b, 1).fillRect(0, 0, width, height);

                this.matchTxt = this.add.text(width-40, 40, `MATCH: 0/${this.total}`, { fontSize: '14px', color: COLORS.accent }).setOrigin(1, 0.5);
                this.timeTxt = this.add.text(40, 70, `TIME: 0s`, { fontSize: '14px', color: COLORS.accent }).setOrigin(0, 0.5);
                this.add.text(40, 40, '← BACK', { fontSize: '14px', color: '#fff', fontStyle: 'bold' }).setInteractive().on('pointerdown', () => this.scene.start('MenuScene'));
                
                this.createBoard();
                this.start = this.time.now;
            }
            update() { if (this.active) { this.timer = Math.floor((this.time.now - this.start) / 1000); this.timeTxt.setText(`TIME: ${this.timer}s`); } }

            createBoard() {
                const { width, height } = this.cameras.main;
                const conf = LEVELS[this.lvl];
                let ids = []; for(let i=0; i<this.total; i++) ids.push(i % SVG_ICONS.length, i % SVG_ICONS.length);
                ids = Phaser.Utils.Array.Shuffle(ids);
                const spc = 15;
                const fW = conf.c * (CARD_SIZE+spc)-spc, fH = conf.r * (CARD_SIZE+spc)-spc;
                let sc = Math.min((width * 0.9)/fW, (height * 0.75)/fH, 1);
                const sX = (width - fW*sc)/2 + (CARD_SIZE*sc/2), sY = (height-fH*sc)/2 + (CARD_SIZE*sc/2) + 60;
                for(let r=0; r<conf.r; r++) { for(let c=0; c<conf.c; c++) {
                    const x = sX + c*(CARD_SIZE+spc)*sc, y = sY + r*(CARD_SIZE+spc)*sc;
                    this.addCard(x, y, ids.pop(), sc);
                }}
            }

            addCard(x, y, id, sc) {
                const card = this.add.container(x, y).setScale(sc);
                const back = this.add.image(0, 0, 'cBack'), front = this.add.image(0, 0, 'cFront').setVisible(false), icon = this.add.image(0, 0, `icon_${id}`).setVisible(false);
                icon.setScale(CARD_SIZE / 512); 
                card.add([front, back, icon]);
                
                // Simpan ID di dalam data objek kartu
                card.setData('id', id);
                card.setData('isOut', false);

                card.setInteractive(new Phaser.Geom.Rectangle(-CARD_SIZE/2, -CARD_SIZE/2, CARD_SIZE, CARD_SIZE), Phaser.Geom.Rectangle.Contains);
                
                card.on('pointerdown', () => {
                    // CEK LOCK: Gak boleh klik kalo game lagi proses, kalo kartu udah kebuka, atau selesei 2 kartu
                    if (this.inputLocked || !this.active || card.getData('isOut') || this.sel.length >= 2) return;
                    
                    this.safePlay('sfx_flip', { volume: 0.6 });
                    card.setData('isOut', true);
                    this.sel.push(card);

                    // Animasi Putar (Flip)
                    this.tweens.add({
                        targets: card,
                        scaleX: 0,
                        duration: 150,
                        onComplete: () => {
                            back.setVisible(false);
                            front.setVisible(true);
                            icon.setVisible(true);
                            this.tweens.add({
                                targets: card,
                                scaleX: sc,
                                duration: 150,
                                onComplete: () => {
                                    // Pengecekan cuma jalan jika sudah 2 kartu terpilih
                                    if (this.sel.length === 2) {
                                        this.inputLocked = true; // KUNCI INPUT TOTAL!
                                        // Kasih jeda dikit biar user bisa liat kartu kedua sebelum diproses
                                        this.time.delayedCall(400, () => this.checkMatch());
                                    }
                                }
                            });
                        }
                    });
                });
            }

            checkMatch() {
                const [a, b] = this.sel;
                if (a.getData('id') === b.getData('id')) {
                    // COCOK!
                    this.mtch++;
                    this.matchTxt.setText(`MATCH: ${this.mtch}/${this.total}`);
                    this.sel = [];
                    this.inputLocked = false; // Buka kunci input
                    if (this.mtch === this.total) { 
                        this.active = false; 
                        this.showWin(); 
                    }
                } else {
                    // SALAH! Balikin kartu
                    this.time.delayedCall(600, () => {
                        this.safePlay('sfx_flip', { volume: 0.4 });
                        this.sel.forEach(card => {
                            this.tweens.add({
                                targets: card,
                                scaleX: 0,
                                duration: 150,
                                onComplete: () => {
                                    card.list[0].setVisible(false); // front hidden
                                    card.list[1].setVisible(true);  // back visible
                                    card.list[2].setVisible(false); // icon hidden
                                    this.tweens.add({
                                        targets: card,
                                        scaleX: card.scaleY,
                                        duration: 150,
                                        onComplete: () => {
                                            card.setData('isOut', false);
                                            // Cek jika ini adalah kartu terakhir yang dibalikin, baru buka lock input
                                            if (card === this.sel[1]) {
                                                this.sel = [];
                                                this.inputLocked = false; 
                                            }
                                        }
                                    });
                                }
                            });
                        });
                    });
                }
            }

            safePlay(key, config = { volume: 0.5 }) {
                if (this.cache.audio.exists(key)) {
                    try { this.sound.play(key, config); } catch(e) {}
                }
            }

            showWin() {
                const { width, height } = this.cameras.main;
                this.safePlay('sfx_win', { volume: 0.7 });
                const overlay = this.add.rectangle(width/2, height/2, width, height, 0x020617, 0.95);
                
                let winImg;
                if (this.textures.exists('win_ark')) {
                    winImg = this.add.image(width/2, height/2 - 60, 'win_ark');
                    const imgScale = Math.min((width * 0.8) / winImg.width, (height * 0.5) / winImg.height);
                    winImg.setScale(imgScale);
                }
                
                const winText = this.add.text(width/2, height/2 + (winImg ? 130 : -50), 'ARK READY TO SAIL!', { fontSize: '42px', fontStyle: 'bold', color: COLORS.accent }).setOrigin(0.5);
                const timeText = this.add.text(width/2, height/2 + (winImg ? 190 : 30), `RESPECT! SAVED IN ${this.timer}s`, { fontSize: '20px', color: '#fff' }).setOrigin(0.5);
                const btn = this.add.text(width/2, height/2 + 250, 'MISSION COMPLETE', { fontSize: '22px', backgroundColor: COLORS.accent, color: '#000', padding: 15, fontStyle: 'bold' }).setOrigin(0.5).setInteractive().on('pointerdown', () => this.scene.start('MenuScene'));
            }
        }

        // AUTO CLEANUP & INIT
        if (window.gameInstance) { 
            try { window.gameInstance.destroy(true); } catch(e) {}
        }
        window.gameInstance = new Phaser.Game({
            type: Phaser.AUTO, parent: 'game-container', width: 600, height: 800,
            backgroundColor: '#020617',
            scene: [BootScene, MenuScene, GameScene],
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        });
    </script>
</body>
</html>
