// ═══════════════════════════════════════════════════════════════
//  VIRTUAL JOYSTICK — touch input mapped to virtual key state
// ═══════════════════════════════════════════════════════════════
const vKeys = { left:false, right:false, up:false, down:false };

// Joystick visibility & lock control — called by GameScene / IntroScene
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
let joystickEnabled = false;

function showJoystick(){
  if(!isTouchDevice) return;
  document.getElementById('joystick-container').style.display = 'block';
  document.getElementById('controls-hint').textContent = '🕹️ Gunakan joystick di bawah untuk bergerak';
}
function hideJoystick(){
  document.getElementById('joystick-container').style.display = 'none';
  document.getElementById('controls-hint').textContent = '⬆️ ⬇️ ⬅️ ➡️ Tombol panah untuk bergerak';
  // reset vKeys when hidden
  vKeys.left = vKeys.right = vKeys.up = vKeys.down = false;
}
function enableJoystick(v){ joystickEnabled = v; if(!v){ vKeys.left=vKeys.right=vKeys.up=vKeys.down=false; } }

(function initJoystick(){

  const zone  = document.getElementById('joystick-zone');
  const knob  = document.getElementById('joystick-knob');
  const RADIUS = 74;  // half of zone width
  const DEAD   = 12;  // dead-zone px
  let activeTouchId = null;
  let zoneRect = null;

  function getCenter(){
    if(!zoneRect) zoneRect = zone.getBoundingClientRect();
    return { cx: zoneRect.left + zoneRect.width/2, cy: zoneRect.top + zoneRect.height/2 };
  }

  function applyDelta(dx, dy){
    const dist = Math.sqrt(dx*dx + dy*dy);
    // Clamp knob to radius
    const clamp = Math.min(dist, RADIUS - 10);
    const ratio = dist > 0 ? clamp/dist : 0;
    const kx = dx * ratio;
    const ky = dy * ratio;
    knob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
    knob.classList.add('active');
    // Direction states
    vKeys.left  = dx < -DEAD;
    vKeys.right = dx >  DEAD;
    vKeys.up    = dy < -DEAD;
    vKeys.down  = dy >  DEAD;
  }

  function reset(){
    knob.style.transform = 'translate(-50%, -50%)';
    knob.classList.remove('active');
    vKeys.left = vKeys.right = vKeys.up = vKeys.down = false;
    activeTouchId = null;
  }

  zone.addEventListener('touchstart', e => {
    e.preventDefault();
    if(!joystickEnabled) return;
    zoneRect = zone.getBoundingClientRect();
    if(activeTouchId === null){
      const t = e.changedTouches[0];
      activeTouchId = t.identifier;
      const {cx,cy} = getCenter();
      applyDelta(t.clientX - cx, t.clientY - cy);
    }
  }, {passive:false});

  window.addEventListener('touchmove', e => {
    e.preventDefault();
    if(!joystickEnabled || activeTouchId === null) return;
    for(const t of e.changedTouches){
      if(t.identifier === activeTouchId){
        const {cx,cy} = getCenter();
        applyDelta(t.clientX - cx, t.clientY - cy);
        break;
      }
    }
  }, {passive:false});

  window.addEventListener('touchend', e => {
    for(const t of e.changedTouches){
      if(t.identifier === activeTouchId){ reset(); break; }
    }
  });
  window.addEventListener('touchcancel', reset);
})();

// ═══════════════════════════════════════════════════════════════
//  WEB AUDIO — suara prosedural
// ═══════════════════════════════════════════════════════════════
let _AC = null;
const getAC = () => _AC || (_AC = new (window.AudioContext || window.webkitAudioContext)());

function beep(freq, type='sine', dur=0.4, vol=0.25, freqRamps=[], startDelay=0) {
  try {
    const ctx = getAC();
    const t0  = ctx.currentTime + startDelay;
    const osc = ctx.createOscillator();
    const gn  = ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    freqRamps.forEach(([dt,v]) => osc.frequency.linearRampToValueAtTime(v, t0+dt));
    gn.gain.setValueAtTime(vol, t0);
    gn.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    osc.start(t0); osc.stop(t0+dur);
  } catch(e) {}
}

      const cy=234+i*62, bx=W/2-124, bw=248, bh=50;
      const btn=this.add.graphics();
      const draw=(a=1)=>{ btn.clear(); btn.fillStyle(d.col,a); btn.fillRoundedRect(bx,cy-bh/2,bw,bh,14); };
      draw();
      btn.setInteractive(new Phaser.Geom.Rectangle(bx,cy-bh/2,bw,bh), Phaser.Geom.Rectangle.Contains);
      btn.on('pointerover',()=>draw(.72)).on('pointerout',()=>draw());
      btn.on('pointerdown',()=>{ currentLevel=i; this.scene.start('GameScene'); });
      this.add.text(W/2,cy-10,d.label,{fontFamily:'Fredoka One,cursive',fontSize:'17px',color:'#fff'}).setOrigin(.5);
      this.add.text(W/2,cy+12,d.sub,{fontFamily:'Nunito,sans-serif',fontSize:'11.5px',color:'rgba(255,255,255,.93)'}).setOrigin(.5);
      if(d.badge){
        const bx2=W/2+102, by2=cy-bh/2-6;
        const bg=this.add.graphics();
        bg.fillStyle(0xFFD700,1).fillRoundedRect(bx2,by2,42,18,8);
        this.add.text(bx2+21,by2+9,d.badge,{fontFamily:'Fredoka One,cursive',fontSize:'10px',color:'#7B3F00'}).setOrigin(.5);
      }
    });

    this.add.text(W/2,H-14,'⬆️⬇️⬅️➡️ Tombol panah / joystick untuk bergerak',{
      fontFamily:'Nunito,sans-serif', fontSize:'11px', color:'#2D6A4F'
    }).setOrigin(.5,1);
  }
}

// ═══════════════════════════════════════════════════════════════
//  GAME SCENE
// ═══════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor(){ super({key:'GameScene'}); }

  create(){
    showJoystick();
    enableJoystick(false); // disabled until countdown finishes
    this.lvl          = currentLevel;
    this.timeLeft     = LEVEL_CFG[this.lvl].time;
    this.totalSheep   = SHEEP_POS[this.lvl].length;
    this.collected    = 0;
    this.score        = 0;
    this.combo        = 0;
    this.over         = false;
    this.wolfCooldowns= [];
    this.wolfIdxs     = [];
    this.wolves       = [];

    const maze = MAZES[this.lvl];

    // ── TILES ──────────────────────────────────────────────────
    this.walls = this.physics.add.staticGroup();
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const cx=c*TILE+TILE/2, cy=r*TILE+TILE/2;
      if(maze[r][c]===1){
        const w=this.walls.create(cx,cy,'wall');
        w.setDisplaySize(TILE,TILE).refreshBody();
      } else {
        this.add.image(cx,cy,'ground').setDisplaySize(TILE,TILE);
      }
    }

    // ── PLAYER ─────────────────────────────────────────────────
    let sc=1,sr=1;
    outer: for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++){
      if(maze[r][c]===0){sc=c;sr=r;break outer;}
    }
    this.player = this.physics.add.sprite(sc*TILE+TILE/2, sr*TILE+TILE/2,'player');
    const pw=TILE*0.4, ph=pw/(87/171);
    this.player.setDisplaySize(pw,ph).setCollideWorldBounds(true);

    // ── SHEEP ──────────────────────────────────────────────────
    const sw=TILE*0.4, sh=sw/(83/86);
    this.sheepGrp = this.physics.add.staticGroup();
    SHEEP_POS[this.lvl].forEach(([c,r])=>{
      const sp=this.sheepGrp.create(c*TILE+TILE/2,r*TILE+TILE/2,'sheep');
      sp.setDisplaySize(sw,sh).refreshBody();
      this.tweens.add({targets:sp,y:sp.y-7,duration:700+Math.random()*300,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    });

    // ── WOLVES ─────────────────────────────────────────────────
    const wolfPaths = WOLF_PATHS[this.lvl];
    if(wolfPaths){
      wolfPaths.forEach((path,wi)=>{
        const [wc,wr]=path[0];
        const ww=TILE*0.5, wh=ww/(81/100);
        const wolf=this.physics.add.sprite(wc*TILE+TILE/2,wr*TILE+TILE/2,'wolf');
        wolf.setDisplaySize(ww,wh);
        if(wi%2===1) wolf.setFlipX(true);
        this.wolves.push(wolf);
        this.wolfCooldowns.push(0);
        this.wolfIdxs.push(0);
        this.physics.add.collider(wolf,this.walls);
        this.physics.add.overlap(this.player,wolf,()=>this._wolfHit(wi),null,this);
      });
      wolfPaths.forEach((_,wi)=>{
        this.time.addEvent({delay:900+wi*300,loop:true,callback:()=>this._moveWolf(wi),callbackScope:this});
      });
    }

    // ── PHYSICS ────────────────────────────────────────────────
    this.physics.add.collider(this.player,this.walls);
    this.physics.add.overlap(this.player,this.sheepGrp,this._grabSheep,null,this);

    // ── CONTROLS ───────────────────────────────────────────────
    this.cursors = this.input.keyboard.createCursorKeys();

    // ── UI ─────────────────────────────────────────────────────
    this._buildUI();

    // ── TIMER ──────────────────────────────────────────────────
    this.time.addEvent({delay:1000,loop:true,callback:this._tick,callbackScope:this});

    // ── BAA OTOMATIS ───────────────────────────────────────────
// ── BAA OTOMATIS ───────────────────────────────────────────
this.time.addEvent({
    delay: 3800,
    loop: true,
    callback: () => {
        if (!this.over && this.sheepGrp.countActive() > 0)
        {
            this.sound.play('sfx_baa');

        }
    }
});


    // ── FEEDBACK TEXT ──────────────────────────────────────────
    this.fbTxt = this.add.text(W/2,H/2-70,'',{
      fontFamily:'Fredoka One,cursive', fontSize:'17px',
      color:'#1B5E20', stroke:'#fff', strokeThickness:4, align:'center'
    }).setOrigin(.5).setDepth(10);

    // ── COMBO TEXT ─────────────────────────────────────────────
    this.comboTxt = this.add.text(W/2,H/2-100,'',{
      fontFamily:'Fredoka One,cursive', fontSize:'22px',
      color:'#FF6B00', stroke:'#fff', strokeThickness:5, align:'center'
    }).setOrigin(.5).setDepth(11);

    if(this.lvl>=3){
      this.add.text(W/2,56,'🐺 Hindari Serigala!',{
        fontFamily:'Fredoka One,cursive',fontSize:'13px',color:'#FF4444',stroke:'#fff',strokeThickness:3
      }).setOrigin(.5).setDepth(6);
    }

    this._showCountdown();
  }

  _showCountdown(){
    this.countingDown = true;
    this.player.setVelocity(0,0);
    const overlay=this.add.graphics().setDepth(20);
    overlay.fillStyle(0x000000,.45).fillRect(0,0,W,H);
    const txt=this.add.text(W/2,H/2,'3',{
      fontFamily:'Fredoka One,cursive',fontSize:'90px',color:'#FFD700',stroke:'#000',strokeThickness:8
    }).setOrigin(.5).setDepth(21);
    let count=3;
    const doCount=()=>{
      if(count>0){ txt.setText(String(count)); SFX.tick(); count--; this.time.delayedCall(700,doCount); }
      else if(count===0){ txt.setText('Mulai!'); SFX.levelup(); count--; this.time.delayedCall(700,()=>{ overlay.destroy(); txt.destroy(); enableJoystick(true); this.countingDown=false; }); }
    };
    doCount();
  }

  _buildUI(){
    this.add.graphics().setDepth(5)
      .fillStyle(0x1B5E20,.88)
      .fillRoundedRect(4,4,W-8,50,12);
    this.add.text(W/2,15,`Level ${this.lvl+1}`,{
      fontFamily:'Fredoka One,cursive',fontSize:'18px',color:'#fff'
    }).setOrigin(.5,0).setDepth(6);
    this.timerTxt = this.add.text(W-14,16,`⏱ ${this.timeLeft}s`,{
      fontFamily:'Nunito,sans-serif',fontSize:'15px',fontStyle:'bold',color:'#FFF9C4'
    }).setOrigin(1,0).setDepth(6);
    this.sheepTxt = this.add.text(14,16,`🐑 0/${this.totalSheep}`,{
      fontFamily:'Nunito,sans-serif',fontSize:'15px',fontStyle:'bold',color:'#FFF9C4'
    }).setOrigin(0,0).setDepth(6);
    this.scoreTxt = this.add.text(W/2,36,`Skor: 0`,{
      fontFamily:'Fredoka One,cursive',fontSize:'13px',color:'#FFD700'
    }).setOrigin(.5,0).setDepth(6);
  }

  _tick(){
    if(this.over) return;
    this.timeLeft--;
    this.timerTxt.setText(`⏱ ${this.timeLeft}s`);
    if(this.timeLeft<=10){
      this.timerTxt.setColor('#FF5252');
      SFX.tick();
      this.tweens.add({targets:this.timerTxt,x:this.timerTxt.x-3,duration:50,yoyo:true,repeat:2,
        onComplete:()=>this.timerTxt.setX(W-14)});
    }
    if(this.timeLeft<=0) this._end(false);
  }

  _grabSheep(_p, sheep){
    if(!sheep.active) return;
    sheep.destroy();
    this.collected++;
    this.combo++;
    const comboBonus = this.combo>1 ? this.combo*30 : 0;
    const basePoints = 100 + comboBonus;
    this.score += basePoints;
    this.sheepTxt.setText(`🐑 ${this.collected}/${this.totalSheep}`);
    this.scoreTxt.setText(`Skor: ${this.score}`);
    SFX.collect();
    if(this.combo>=2){
      SFX.combo();
      this._fbCombo(`COMBO x${this.combo}! +${basePoints}✨`);
    } else {
      this._fb('🐑 Domba ditemukan! +100 ✨');
    }
    if(this.collected>=this.totalSheep) this._end(true);
  }

  _wolfHit(wi){
    if(this.over||this.wolfCooldowns[wi]>0) return;
    this.wolfCooldowns[wi]=3000;
    SFX.wolfHit();
    this.combo=0;
    if(this.collected>0){
      this.collected--;
      this.score=Math.max(0,this.score-50);
      this.sheepTxt.setText(`🐑 ${this.collected}/${this.totalSheep}`);
      this.scoreTxt.setText(`Skor: ${this.score}`);
      this._respawnSheep();
      this._fb('🐺 Aduh! Serigala nakal!\nDomba kabur lagi... 😅');
    } else {
      this._fb('🐺 Serigala menyerang!\nHati-hati! 😰');
    }
    this.cameras.main.shake(200,0.012);
    this.tweens.add({targets:this.player,alpha:.3,duration:90,yoyo:true,repeat:5,
      onComplete:()=>this.player.setAlpha(1)});
    this.time.delayedCall(3000,()=>{ this.wolfCooldowns[wi]=0; });
  }

  _respawnSheep(){
    const maze=MAZES[this.lvl], open=[];
    for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++)
      if(maze[r][c]===0) open.push([c,r]);
    const px=Math.floor(this.player.x/TILE), py=Math.floor(this.player.y/TILE);
    open.sort((a,b)=>(Math.abs(b[0]-px)+Math.abs(b[1]-py))-(Math.abs(a[0]-px)+Math.abs(a[1]-py)));
    const [rc,rr]=open[0];
    const sw=TILE*0.4, sh=sw/(83/86);
    const ns=this.sheepGrp.create(rc*TILE+TILE/2,rr*TILE+TILE/2,'sheep');
    ns.setDisplaySize(sw,sh).refreshBody();
    this.tweens.add({targets:ns,y:ns.y-7,duration:750,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
  }

  _moveWolf(wi){
    if(!this.wolves[wi]||this.over) return;
    const path=WOLF_PATHS[this.lvl][wi];
    this.wolfIdxs[wi]=(this.wolfIdxs[wi]+1)%path.length;
    const [c,r]=path[this.wolfIdxs[wi]];
    const speed = this.lvl>=4 ? 700 : 850;
    this.tweens.add({targets:this.wolves[wi],x:c*TILE+TILE/2,y:r*TILE+TILE/2,duration:speed,ease:'Linear'});
  }

  _fb(txt){
    this.fbTxt.setText(txt).setAlpha(1).setY(H/2-70);
    this.tweens.add({targets:this.fbTxt,y:H/2-115,alpha:0,duration:2500,ease:'Cubic.easeOut'});
  }

  _fbCombo(txt){
    this.comboTxt.setText(txt).setAlpha(1).setY(H/2-100).setScale(1.4);
    this.tweens.add({targets:this.comboTxt,y:H/2-150,alpha:0,scaleX:1,scaleY:1,duration:1800,ease:'Cubic.easeOut'});
  }

  _end(win){
    if(this.over) return;
    this.over=true;
    enableJoystick(false);
    hideJoystick();
    this.player.setVelocity(0,0);
    const moral=LEVEL_CFG[this.lvl].moral;
    const last=this.lvl>=4;

    if(win){
      const bonus    = LEVEL_CFG[this.lvl].bonus;
      const timePts  = this.timeLeft*5;
      const finalScore = this.score + timePts + bonus;
      const stars    = calcStars(this.lvl, this.timeLeft);
      updateHighScore(finalScore);

      if(stars===3) SFX.superWin(); else SFX.win();

      const scoreDetail=`⏱ Bonus waktu: +${timePts} | 🎁 Bonus level: +${bonus}\n💯 Total: ${finalScore}`;
      const msg = last
        ? `Semua level selesai! Kamu Gembala Terbaik! 🏆`
        : `Semua domba aman! Lanjut Level ${this.lvl+2}! 🎊`;

      showPopup(
        stars===3?'🌟':stars===2?'🎉':'✨',
        last?'JUARA!':stars===3?'Sempurna!':'Hebat!',
        msg, moral,
        last?'🎊 Main Lagi':'Level Berikutnya →',
        ()=>{ currentLevel=last?0:this.lvl+1; this.scene.restart(); },
        scoreDetail, stars, true,
        ()=>{ this.scene.start('IntroScene'); }
      );
    } else {
      SFX.lose();
      updateHighScore(this.score);
      showPopup('🌟','Waktu Habis!',
        `Tidak apa-apa! Latihan lagi ya! Skor: ${this.score}`,
        moral,'🔄 Coba Lagi',
        ()=>this.scene.restart(),
        '','',0,false, true,
        ()=>{ this.scene.start('IntroScene'); }
      );
    }
  }

  update(_t,delta){
    if(this.over || this.countingDown) return;
    this.wolfCooldowns=this.wolfCooldowns.map(c=>Math.max(0,c-delta));
    this.player.setVelocity(0,0);
    const spd=150;

    // Keyboard OR virtual joystick
    if(this.cursors.left.isDown  || vKeys.left)  { this.player.setVelocityX(-spd); this.player.setFlipX(true);  }
    if(this.cursors.right.isDown || vKeys.right)  { this.player.setVelocityX( spd); this.player.setFlipX(false); }
    if(this.cursors.up.isDown    || vKeys.up)     this.player.setVelocityY(-spd);
    if(this.cursors.down.isDown  || vKeys.down)   this.player.setVelocityY( spd);
  }
}

// ═══════════════════════════════════════════════════════════════
//  PHASER INIT
// ═══════════════════════════════════════════════════════════════
new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  parent: 'game-container',
  backgroundColor: '#7CCC6C',
  physics:{ default:'arcade', arcade:{gravity:{y:0},debug:false} },
  scene:[IntroScene, GameScene],
});
</script>
