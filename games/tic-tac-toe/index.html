<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    min-height: 100vh;
    background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
    display: flex; justify-content: center; align-items: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ── SCREENS ── */
#selectScreen, #gameScreen {
    display: flex; flex-direction: column; align-items: center;
    gap: 1.2rem; padding: 28px 24px;
    border-radius: 36px;
    background: rgba(10,20,28,0.75);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    min-width: 320px;
}
#gameScreen { display: none; }

h1 {
    font-size: 1.5rem; font-weight: 800;
    color: #ffdd99; letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.section-label {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 3px;
    color: #5d8099; text-transform: uppercase; margin-bottom: -4px;
    align-self: flex-start; padding-left: 4px;
}

/* ── LEVEL BUTTONS ── */
.level-row {
    display: flex; gap: 0.6rem; width: 100%;
}
.level-btn {
    flex: 1; padding: 0.55rem 0; border-radius: 2rem;
    font-weight: 700; font-size: 0.82rem; color: #8aacbe;
    background: #0f212e; border: 2px solid #1e3040;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.level-btn:hover { border-color: #4a7fa0; color: #c8dde8; }
.level-btn.active {
    background: #1a4a6a; border-color: #3b82f6;
    color: #ffffff; box-shadow: 0 0 12px rgba(59,130,246,0.35);
}

/* ── CHARACTER CARDS ── */
.char-row {
    display: flex; gap: 0.8rem; width: 100%;
}
.char-col { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; }
.char-col-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;
    color: #4a7fa0; text-transform: uppercase;
}
.char-card {
    width: 100%; padding: 0.6rem 0.4rem;
    border-radius: 14px;
    background: #0f1e2a; border: 2px solid #1a2f3e;
    cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.char-card:hover { border-color: #4a7fa0; transform: translateY(-2px); }
.char-card.selected-p1 {
    border-color: #3b82f6; background: #0d2035;
    box-shadow: 0 0 14px rgba(59,130,246,0.4);
}
.char-card.selected-p2 {
    border-color: #ef4444; background: #200d0d;
    box-shadow: 0 0 14px rgba(239,68,68,0.4);
}
.char-card svg { width: 54px; height: 54px; }
.char-card .char-name {
    font-size: 0.72rem; font-weight: 700;
    color: #7a9ab0; letter-spacing: 1px; text-transform: uppercase;
}
.char-card.selected-p1 .char-name { color: #60a5fa; }
.char-card.selected-p2 .char-name { color: #f87171; }

/* ── START BTN ── */
#startBtn {
    width: 100%; padding: 0.75rem;
    border-radius: 2rem; border: none;
    background: #ff7b2c; color: white;
    font-size: 1rem; font-weight: 800;
    font-family: inherit; cursor: pointer;
    box-shadow: 0 5px 0 #a33f00;
    transition: all 0.15s; letter-spacing: 1px;
    opacity: 0.4; pointer-events: none;
}
#startBtn.ready { opacity: 1; pointer-events: all; }
#startBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a33f00; }

/* ── GAME SCREEN ── */
.status-bar {
    background: #0e1c26; padding: 0.45rem 1.4rem;
    border-radius: 40px; font-size: 1.1rem; font-weight: bold;
    color: #ffdd99; text-shadow: 0 2px 2px black;
    min-width: 240px; text-align: center;
    border: 1px solid rgba(255,200,100,0.3);
}
#phaser-game { width: 300px; height: 300px; border-radius: 20px; overflow: hidden; }
#phaser-game canvas { display: block !important; border-radius: 20px !important; width: 300px !important; height: 300px !important; }

.game-btns { display: flex; gap: 0.8rem; }
.btn-secondary {
    padding: 0.5rem 1.3rem; border-radius: 3rem; border: none;
    background: #1e3040; color: #9ab8cc;
    font-size: 0.85rem; font-weight: 700; font-family: inherit;
    cursor: pointer; box-shadow: 0 3px 0 #0a161f;
    transition: all 0.15s;
}
.btn-secondary:hover { background: #2a4560; color: #cce0ed; }
.btn-secondary:active { transform: translateY(2px); box-shadow: 0 1px 0 #0a161f; }
.btn-primary {
    padding: 0.5rem 1.3rem; border-radius: 3rem; border: none;
    background: #ff7b2c; color: white;
    font-size: 0.85rem; font-weight: 700; font-family: inherit;
    cursor: pointer; box-shadow: 0 3px 0 #a33f00;
    transition: all 0.15s;
}
.btn-primary:active { transform: translateY(2px); box-shadow: 0 1px 0 #a33f00; }

/* ── SCOREBOARD ── */
.scoreboard {
    display: flex; gap: 1.2rem; align-items: center;
}
.score-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.score-item svg { width: 28px; height: 28px; }
.score-num {
    font-size: 1.4rem; font-weight: 900; color: #ffdd99;
    line-height: 1;
}
.score-lbl { font-size: 0.62rem; color: #4a7fa0; letter-spacing: 2px; font-weight: 700; }
.score-sep { font-size: 1.5rem; color: #1e3040; font-weight: 900; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>

<!-- ══════════════ SELECT SCREEN ══════════════ -->
<div id="selectScreen">
    <h1>⬡ TIC TAC TOE</h1>

    <span class="section-label">Pilih Lawan Main</span>
    <div class="level-row">

        <button class="level-btn" data-level="hard">🌾 Yusuf</button>
    </div>

    <span class="section-label">Pilih Jagoan Kamu (P1 = kamu, P2 = CPU)</span>
    <div class="char-row" id="charRow"></div>

    <button id="startBtn">▶ MULAI MAIN</button>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div id="gameScreen">

            <div class="score-lbl">DRAW</div>

        <div class="score-item">
            <div id="p2ScoreIcon"></div>
            <div class="score-num" id="p2Score">0</div>
            <div class="score-lbl">CPU</div>
        </div>
    </div>
    <div class="status-bar" id="gameStatus">✨ YOUR TURN ✨</div>
    <div id="phaser-game"></div>
    <div class="game-btns">
        <button class="btn-secondary" id="backBtn">← Ganti Jagoan</button>
        <button class="btn-primary" id="playAgainBtn">🔄 Main Lagi</button>

</div>

// ══ State ══
let selectedP1 = null;
let selectedP2 = null;
let selectedLevel = 'medium';
let scores = { p1: 0, draw: 0, p2: 0 };
let phaserGame = null;

// ══ Build char select cards ══
const charRow = document.getElementById('charRow');
const colP1 = document.createElement('div'); colP1.className = 'char-col';
const colP2 = document.createElement('div'); colP2.className = 'char-col';
colP1.innerHTML = '<div class="char-col-label">🔵 P1 (Kamu)</div>';
colP2.innerHTML = '<div class="char-col-label">🔴 CPU</div>';

CHARS.forEach(ch => {
    // P1 card
    const c1 = document.createElement('div');
    c1.className = 'char-card'; c1.dataset.key = ch.key;
    c1.innerHTML = ch.svg + `<div class="char-name">${ch.name}</div>`;
    c1.addEventListener('click', () => selectChar('p1', ch.key, c1));
    colP1.appendChild(c1);

    // P2 card
    const c2 = document.createElement('div');
    c2.className = 'char-card'; c2.dataset.key = ch.key;
    c2.innerHTML = ch.svg + `<div class="char-name">${ch.name}</div>`;
    c2.addEventListener('click', () => selectChar('p2', ch.key, c2));
    colP2.appendChild(c2);
});
charRow.appendChild(colP1);
charRow.appendChild(colP2);

function selectChar(player, key, el) {
    const col = player === 'p1' ? colP1 : colP2;
    col.querySelectorAll('.char-card').forEach(c => {
        c.classList.remove('selected-p1', 'selected-p2');
    });
    el.classList.add(player === 'p1' ? 'selected-p1' : 'selected-p2');
    if (player === 'p1') selectedP1 = key;
    else selectedP2 = key;
    checkReady();
}

function checkReady() {
    const btn = document.getElementById('startBtn');
    if (selectedP1 && selectedP2 && selectedP1 !== selectedP2) {
        btn.classList.add('ready');
        btn.textContent = `▶ MULAI — ${CHARS.find(c=>c.key===selectedP1).name} vs ${CHARS.find(c=>c.key===selectedP2).name}`;
    } else if (selectedP1 && selectedP2 && selectedP1 === selectedP2) {
        btn.classList.remove('ready');
        btn.textContent = '⚠ Pilih jagoan berbeda!';
    } else {
        btn.classList.remove('ready');
        btn.textContent = '▶ MULAI MAIN';
    }
}

// Level buttons
document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedLevel = btn.dataset.level;
    });
});

// Start
document.getElementById('startBtn').addEventListener('click', () => {
    if (!selectedP1 || !selectedP2 || selectedP1 === selectedP2) return;
    updateScoreIcons();
    showGameScreen();
    startPhaserGame(false);
});

// Back
document.getElementById('backBtn').addEventListener('click', () => {
    if (phaserGame) { phaserGame.destroy(true); phaserGame = null; }
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('selectScreen').style.display = 'flex';
});

// Play again — tidak restart scene, langsung reset board state saja
document.getElementById('playAgainBtn').addEventListener('click', () => {
    startPhaserGame(true); // true = reuse existing game, just reset
});

function updateScoreIcons() {
    const p1ch = CHARS.find(c => c.key === selectedP1);
    const p2ch = CHARS.find(c => c.key === selectedP2);
    document.getElementById('p1ScoreIcon').innerHTML = `<svg viewBox="0 0 800 800" style="width:28px;height:28px">${p1ch.svg}</svg>`;
    document.getElementById('p2ScoreIcon').innerHTML = `<svg viewBox="0 0 800 800" style="width:28px;height:28px">${p2ch.svg}</svg>`;
}

function showGameScreen() {
    document.getElementById('selectScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'flex';
}

// ══════════════════════════════════════════
//  PHASER GAME
// ══════════════════════════════════════════
const CELL = 100;
const BPOW = 3;
const BPX = CELL * BPOW;

function startPhaserGame(playAgain) {
    if (playAgain && phaserGame) {
        // Dapatkan scene aktif dan reset saja — tidak destroy/restart
        const scene = phaserGame.scene.getScene('Game');
        if (scene) { scene.resetBoard(); return; }
    }
    // Destroy game lama kalau ada
    if (phaserGame) { phaserGame.destroy(true); phaserGame = null; }

    // Bersihkan container
    const container = document.getElementById('phaser-game');
    container.innerHTML = '';

    const p1key = selectedP1;
    const p2key = selectedP2;
    const level = selectedLevel;

    class GameScene extends Phaser.Scene {
        constructor() { super({ key: 'Game' }); }

        preload() {
            // FIX: selalu remove texture lama sebelum load
            // Karena kita destroy game, texture cache sudah bersih.
            // Tapi untuk keamanan extra:
            if (this.textures.exists(p1key)) this.textures.remove(p1key);
            if (this.textures.exists(p2key)) this.textures.remove(p2key);

            this._loadSvg(p1key, CHARS.find(c=>c.key===p1key).svg);
            this._loadSvg(p2key, CHARS.find(c=>c.key===p2key).svg);
        }

        _loadSvg(key, svg_string) {
    const blob = new Blob([svg_string], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);

	this.load.svg(key, url, { width: 70, height: 70 });
}


        create() {
            if (this._urls) { this._urls.forEach(u=>URL.revokeObjectURL(u)); this._urls=[]; }

            this.board = Array(9).fill(null);
            this.marks = [];
            this.over = false;
            this.turn = 'player';
            this.lvl = level;
            this._pending = null;

            // Draw board
            this.add.rectangle(0,0,BPX,BPX,0x0b1520).setOrigin(0,0);
            const g = this.add.graphics();
            g.lineStyle(3, 0x2a4a60, 1);
            for(let i=1;i<3;i++){
                g.moveTo(i*CELL,0).lineTo(i*CELL,BPX);
                g.moveTo(0,i*CELL).lineTo(BPX,i*CELL);
            }
            g.strokePath();
            // Subtle glow lines
            const g2 = this.add.graphics();
            g2.lineStyle(1,0x4a8aaa,0.3);
            for(let i=1;i<3;i++){
                g2.moveTo(i*CELL,0).lineTo(i*CELL,BPX);
                g2.moveTo(0,i*CELL).lineTo(BPX,i*CELL);
            }
            g2.strokePath();

            this.zones = [];
            for(let r=0;r<3;r++) for(let c=0;c<3;c++){
                const idx=r*3+c;
                const z=this.add.zone(c*CELL+50,r*CELL+50,CELL-8,CELL-8)
                    .setInteractive({useHandCursor:true})
                    .on('pointerdown',()=>this.click(idx));
                this.zones[idx]=z;
            }
            this.setStatus('✨ YOUR TURN ✨');
        }

        resetBoard() {
            // Hapus mark lama
            this.marks.forEach(m=>{ if(m&&m.destroy) m.destroy(); });
            this.marks=[];
            this.board=Array(9).fill(null);
            this.over=false;
            this.turn='player';
            if(this._pending) clearTimeout(this._pending);
            this.zones.forEach(z=>z.setInteractive({useHandCursor:true}));
            this.setStatus('✨ YOUR TURN ✨');
        }

        click(idx){
            if(this.over||this.turn!=='player'||this.board[idx]!==null) return;
            this.move(idx,'player');
        }

        move(idx, who){
            if(this.over||this.board[idx]!==null) return;
            const sym = who==='player'?'P':'C';
            this.board[idx]=sym;
            this.placeMark(idx, who==='player'?p1key:p2key);

            const w=this.winner();
            const draw=!w&&this.board.every(c=>c!==null);
            if(w||draw){
                this.over=true;
                this.zones.forEach(z=>z.disableInteractive());
                if(w==='P'){ scores.p1++; this.flash(0x3B82F6); this.setStatus('🎉 KAMU MENANG!'); }
                else if(w==='C'){ scores.p2++; this.flash(0xef4444); this.setStatus('🤖 CPU MENANG!'); }
                else { scores.draw++; this.setStatus('🤝 SERI!'); }
                this.updateScoreUI();
                return;
            }
            if(who==='player'){
                this.turn='computer';
                this.setStatus('🤖 CPU MIKIR...');
                this._pending=setTimeout(()=>this.cpuMove(),320);
            } else {
                this.turn='player';
                this.setStatus('✨ YOUR TURN ✨');
            }
        }

        placeMark(idx, key){
            const c=idx%3, r=Math.floor(idx/3);
            const img=this.add.image(c*CELL+50,r*CELL+50,key)
                .setDisplaySize(70,70).setDepth(10).setScale(0.05);
            this.tweens.add({targets:img,scaleX:1,scaleY:1,duration:200,ease:'Back.Out'});
            this.marks[idx]=img;
        }

        cpuMove(){
            if(this.over||this.turn!=='computer') return;
            const empty=this.board.map((v,i)=>v===null?i:-1).filter(i=>i>=0);
            if(!empty.length) return;
            let idx;
            if(this.lvl==='easy') idx=empty[Math.floor(Math.random()*empty.length)];
            else if(this.lvl==='medium') idx=this.mediumMove(empty);
            else idx=this.bestMove();
            this.move(idx??empty[0],'cpu');
        }

        mediumMove(empty){
            const w=this.findWin('C'); if(w!==-1) return w;
            const b=this.findWin('P'); if(b!==-1) return b;
            return empty[Math.floor(Math.random()*empty.length)];
        }

        findWin(s){
            for(let i=0;i<9;i++) if(this.board[i]===null){
                const b=[...this.board]; b[i]=s;
                if(this.winOn(b)===s) return i;
            }
            return -1;
        }

        bestMove(){
            let best=-Infinity, mv=-1;
            for(let i=0;i<9;i++) if(this.board[i]===null){
                const b=[...this.board]; b[i]='C';
                const s=this.mm(b,0,false);
                if(s>best){best=s;mv=i;}
            }
            return mv!==-1?mv:this.board.findIndex(c=>c===null);
        }

        mm(b,d,max){
            const w=this.winOn(b);
            if(w==='C') return 10-d;
            if(w==='P') return -10+d;
            if(b.every(c=>c!==null)) return 0;
            if(max){
                let v=-Infinity;
                for(let i=0;i<9;i++) if(b[i]===null){b[i]='C';v=Math.max(v,this.mm(b,d+1,false));b[i]=null;}
                return v;
            } else {
                let v=Infinity;
                for(let i=0;i<9;i++) if(b[i]===null){b[i]='P';v=Math.min(v,this.mm(b,d+1,true));b[i]=null;}
                return v;
            }
        }

        winOn(b){
            const L=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(const[a,c,d]of L) if(b[a]&&b[a]===b[c]&&b[a]===b[d]) return b[a];
            return null;
        }
        winner(){ return this.winOn(this.board); }

        flash(color){
            const ov=this.add.rectangle(0,0,BPX,BPX,color,0.2).setOrigin(0,0);
            this.tweens.add({targets:ov,alpha:0,duration:600,onComplete:()=>ov.destroy()});
        }

        setStatus(msg){ document.getElementById('gameStatus').textContent=msg; }
        updateScoreUI(){
            document.getElementById('p1Score').textContent=scores.p1;
            document.getElementById('drawScore').textContent=scores.draw;
            document.getElementById('p2Score').textContent=scores.p2;
        }
    }

    phaserGame = new Phaser.Game({
        type: Phaser.AUTO,
        parent: 'phaser-game',
        width: 300, height: 300,
        backgroundColor: '#0b1520',
        scene: GameScene,
        scale: { mode: Phaser.Scale.NONE, width: 300, height: 300 },
        antialias: true,
        roundPixels: true,
    });
}

})();
</script>
